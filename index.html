<!DOCTYPE html>

<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Онлайн мектеп</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6a5cff,#8f7bff,#b3a8ff);
text-align:center;
overflow-x:hidden;
}

/* учкан иконкалар */

.floating{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.icon{
position:absolute;
font-size:30px;
animation:fly 12s linear infinite;
opacity:0.7;
}

.icon:nth-child(1){left:10%}
.icon:nth-child(2){left:30%}
.icon:nth-child(3){left:50%}
.icon:nth-child(4){left:70%}
.icon:nth-child(5){left:90%}

@keyframes fly{
0%{transform:translateY(100vh) rotate(0deg)}
100%{transform:translateY(-100vh) rotate(360deg)}
}

header{
background:#4f46ff;
color:white;
padding:15px;
font-size:20px;
}

.box{
background:white;
width:92%;
max-width:520px;
margin:20px auto;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
background:#5a54ff;
color:white;
border:none;
border-radius:8px;
}

.exit{background:#ff4d4d}
.restart{background:#00a86b}

input{
width:90%;
padding:10px;
margin:8px;
font-size:16px;
}

.q{text-align:left;margin-top:15px}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

#timer{
font-size:20px;
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="floating">
<div class="icon">📚</div>
<div class="icon">✏️</div>
<div class="icon">📖</div>
<div class="icon">🎒</div>
<div class="icon">📐</div>
</div>

<header>📚 Онлайн мектеп</header>

<div class="box" id="start">
<h3>Ким кирет?</h3>
<button onclick="openTeacher()">👨‍🏫 Мугалим</button>
<button onclick="openStudent()">👦 Окуучу</button>
</div>

<div class="box" id="teacherLogin" style="display:none">
<h3>Мугалим</h3>
<input id="tname" placeholder="ФИО">
<input type="password" placeholder="ПИН код">
<button onclick="enterTeacher()">Кирүү</button>
<button class="exit" onclick="home()">Выйти</button>
</div>

<div class="box" id="studentLogin" style="display:none">
<h3>Окуучу</h3>
<input id="sname" placeholder="ФИО">
<input type="password" placeholder="ПИН код">
<button onclick="enterStudent()">Баштоо</button>
<button class="exit" onclick="home()">Выйти</button>
</div>

<div class="box" id="subjects" style="display:none">
<h3>Предмет тандоо</h3>
<button onclick="startTest('math')">Математика</button>
<button onclick="startTest('ru')">Орус тили</button>
<button onclick="startTest('kg')">Кыргыз тили</button>
<button onclick="startTest('lit')">Адабий окуу</button>
<button onclick="startTest('meken')">Мекен таануу</button>
<button class="exit" onclick="home()">Выйти</button>
</div>

<div class="box" id="test" style="display:none">
<h3 id="subjectTitle"></h3>

<div id="timer">⏱ Убакыт: 10:00</div>

<div id="questionBox"></div>

<button onclick="finish()">Жыйынтык</button> <button class="exit" onclick="home()">Выйти</button>

<p id="result"></p>
<div id="restartArea"></div>

</div>

<div class="box" id="journal" style="display:none">
<h3>Мугалим журналы</h3>

<table>
<thead>
<tr>
<th>Окуучу</th>
<th>Предмет</th>
<th>Балл</th>
<th>Баа</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<button class="exit" onclick="home()">Выйти</button>

</div>

<script>

let results=[]
let questions=[]
let subjectName=""
let currentKey=""

let time=600
let timerInterval

const data={

math:{name:"Математика",q:[
{q:"5+5=?",a:["8","9","10","11"],c:2},
{q:"7+3=?",a:["8","9","10","11"],c:2},
{q:"9-4=?",a:["5","6","7","4"],c:0}
]},

ru:{name:"Орус тили",q:[
{q:"Слово мама канча тамга?",a:["3","4","5","6"],c:1}
]},

kg:{name:"Кыргыз тили",q:[
{q:"Кыргыз тили кайсы?",a:["орус","кыргыз","англис","кытай"],c:1}
]},

lit:{name:"Адабий окуу",q:[
{q:"Китепти ким жазат?",a:["жазуучу","айдоочу","доктур","мугалим"],c:0}
]},

meken:{name:"Мекен таануу",q:[
{q:"Кыргызстандын борбору?",a:["Ош","Бишкек","Нарын","Талас"],c:1}
]}

}

function home(){

start.style.display="block"
teacherLogin.style.display="none"
studentLogin.style.display="none"
subjects.style.display="none"
test.style.display="none"
journal.style.display="none"

clearInterval(timerInterval)

}

function openTeacher(){
start.style.display="none"
teacherLogin.style.display="block"
}

function openStudent(){
start.style.display="none"
studentLogin.style.display="block"
}

function enterTeacher(){
teacherLogin.style.display="none"
journal.style.display="block"
updateJournal()
}

function enterStudent(){
studentLogin.style.display="none"
subjects.style.display="block"
}

function startTimer(){

time=600

timerInterval=setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

if(s<10)s="0"+s

timer.innerText="⏱ Убакыт: "+m+":"+s

if(time<=0){

clearInterval(timerInterval)
alert("Убакыт бүттү")
finish()

}

},1000)

}

function startTest(key){

currentKey=key

let d=data[key]

subjectName=d.name
questions=d.q

subjects.style.display="none"
test.style.display="block"

subjectTitle.innerText=d.name

startTimer()

let html=""

questions.forEach((q,i)=>{

html+="<div class='q'>"+(i+1)+") "+q.q+"<br>"

q.a.forEach((o,j)=>{

html+="<label><input type='radio' name='q"+i+"' value='"+j+"'> "+o+"</label><br>"

})

html+="</div>"

})

questionBox.innerHTML=html

}

function finish(){

clearInterval(timerInterval)

let score=0

questions.forEach((q,i)=>{

let a=document.querySelector("input[name='q"+i+"']:checked")

if(a && parseInt(a.value)==q.c){
score++
}

})

let grade=2

if(score>=3)grade=5
else if(score==2)grade=4
else if(score==1)grade=3

let msg="Балл: "+score+" | Баа: "+grade

if(grade==2){
msg+=" 😅 Сен двойичниксинбы?"
}

result.innerText=msg

restartArea.innerHTML="<button class='restart' onclick='startTest(currentKey)'>🔄 Кайра баштоо</button>"

results.push({
name:sname.value,
subject:subjectName,
score:score,
grade:grade
})

updateJournal()

}

function updateJournal(){

table.innerHTML=""

results.forEach(r=>{

table.innerHTML+=`
<tr>
<td>${r.name}</td>
<td>${r.subject}</td>
<td>${r.score}</td>
<td>${r.grade}</td>
</tr>
`

})

}

</script>

</body>
</html>
