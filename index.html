<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Galaxy Ultimate</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white}
canvas{display:block;margin:auto}

/* КНОПКИ */
button{
position:absolute;
padding:14px 18px;
border:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 10px rgba(255,255,255,0.4);
}

#jumpBtn{bottom:20px;left:20px;display:none}
#shootBtn{bottom:20px;right:20px;display:none}
#ultBtn{bottom:90px;right:20px;display:none}
#shopBtn{top:15px;right:15px;display:none}

/* МЕНЮ */
#menu,#gameOver{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.95);
padding:30px;
border-radius:20px;
text-align:center;
width:340px;
}

#gameOver{display:none}
#ui{position:absolute;top:10px;left:10px}

/* БОЛЬШОЙ МАГАЗИН */
#shop{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
width:650px;
height:500px;
background:rgba(0,0,0,0.98);
border-radius:25px;
padding:25px;
display:none;
z-index:20;
overflow:auto;
box-shadow:0 0 35px rgba(0,255,0,0.7);
text-align:center;
}

.shopMainBtn{
position:relative;
width:45%;
margin:10px 2%;
padding:15px;
background:#111;
border-radius:15px;
display:inline-block;
font-size:20px;
}

.shopItem{
position:relative;
display:block;
width:100%;
margin:8px 0;
padding:12px;
background:#111;
border-radius:12px;
}
</style>
</head>
<body>

<div id="menu">
<h1>🦖 DINO GALAXY</h1>
<button onclick="startGame()">PLAY</button>
</div>

<div id="gameOver">
<h1>💀 GAME OVER</h1>
<button onclick="restart()">RESTART</button>
</div>

<div id="shop"></div>
<div id="ui"></div>

<button id="jumpBtn">⬆</button>
<button id="shootBtn">🔫</button>
<button id="ultBtn">⚡</button>
<button id="shopBtn">🛒 SHOP</button>

<canvas id="game" width="900" height="500" style="display:none"></canvas>

<script>

/* DOM */
const menu=document.getElementById("menu");
const shop=document.getElementById("shop");
const ui=document.getElementById("ui");
const gameOver=document.getElementById("gameOver");
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const jumpBtn=document.getElementById("jumpBtn");
const shootBtn=document.getElementById("shootBtn");
const ultBtn=document.getElementById("ultBtn");
const shopBtn=document.getElementById("shopBtn");

/* GAME DATA */
let ground=420;
let score=0;
let coins=50; // чтобы можно было покупать
let lives=10;
let level=1;
let device="phone";
let gameRunning=false;
let shopOpen=false;

let weaponDamage=5;
let playerColor="#32cd32";
let legendary=false;

/* PLAYER */
let player={x:100,y:ground-60,vy:0,gravity:1,jump:-18,grounded:true};

/* MENU */
function startGame(){
menu.innerHTML=`
<h2>Выберите устройство</h2>
<br>
<button onclick="selectDevice('pc')">ПК</button><br><br>
<button onclick="selectDevice('phone')">Телефон</button>
`;
}

function selectDevice(type){
device=type;

if(type==="pc"){
menu.innerHTML=`
<h2>💻 УПРАВЛЕНИЕ</h2>
<p>Прыжок — ПРОБЕЛ</p>
<p>Стрелять — Клик мыши</p>
<p>Ульта — F</p>
<br>
<button onclick="startPCGame()">НАЧАТЬ</button>
`;
return;
}

startMobileGame();
}

function startPCGame(){
menu.style.display="none";
canvas.style.display="block";
shopBtn.style.display="block";
gameRunning=true;
update();
}

function startMobileGame(){
menu.style.display="none";
canvas.style.display="block";
shopBtn.style.display="block";
jumpBtn.style.display="block";
shootBtn.style.display="block";
ultBtn.style.display="block";
gameRunning=true;
update();
}

function restart(){location.reload();}

/* ===== МАГАЗИН ===== */
shopBtn.onclick=()=>{
shopOpen=true;
gameRunning=false;   // ПАУЗА
shop.style.display="block";
openMainShop();
};

function closeShop(){
shopOpen=false;
shop.style.display="none";
gameRunning=true;    // ВОЗВРАТ ИГРЫ
update();
}

function openMainShop(){
shop.innerHTML=`
<h1>🛒 МАГАЗИН</h1>
<p>💰 Монеты: ${coins}</p>
<button class="shopMainBtn" onclick="openSkins()">🎨 СКИНЫ</button>
<button class="shopMainBtn" onclick="openWeapons()">🔫 ОРУЖИЕ</button>
<br><br>
<button class="shopItem" onclick="closeShop()">❌ Закрыть</button>
`;
}

function openSkins(){
shop.innerHTML=`
<h1>🎨 СКИНЫ</h1>
<p>💰 Монеты: ${coins}</p>

<button class="shopItem" onclick="buySkin('#32cd32',5)">🟢 Зелёный (5)</button>
<button class="shopItem" onclick="buySkin('blue',5)">🔵 Синий (5)</button>
<button class="shopItem" onclick="buySkin('red',5)">🔴 Красный (5)</button>
<button class="shopItem" onclick="buySkin('purple',5)">🟣 Фиолетовый (5)</button>
<button class="shopItem" onclick="buyLegendary()">🌈 Легендарный (30)</button>

<br>
<button class="shopItem" onclick="openMainShop()">⬅ Назад</button>
`;
}

function openWeapons(){
shop.innerHTML=`
<h1>🔫 ОРУЖИЕ</h1>
<p>💰 Монеты: ${coins}</p>

<button class="shopItem" onclick="buyWeapon(5,10)">🔫 Пистолет (10)</button>
<button class="shopItem" onclick="buyWeapon(8,20)">🔫 АК-47 (20)</button>
<button class="shopItem" onclick="buyWeapon(15,30)">💥 Гранатомёт (30)</button>
<button class="shopItem" onclick="buyWeapon(20,40)">⚡ Лазер (40)</button>
<button class="shopItem" onclick="buyWeapon(30,50)">🔥 Плазма (50)</button>

<br>
<button class="shopItem" onclick="openMainShop()">⬅ Назад</button>
`;
}

function buySkin(color,price){
if(coins>=price){
coins-=price;
playerColor=color;
legendary=false;
openSkins();
}
}

function buyLegendary(){
if(coins>=30){
coins-=30;
legendary=true;
openSkins();
}
}

function buyWeapon(dmg,price){
if(coins>=price){
coins-=price;
weaponDamage=dmg;
openWeapons();
}
}

/* GAME LOOP */
function update(){
if(!gameRunning)return;

ctx.fillStyle="black";
ctx.fillRect(0,0,900,500);

/* Player */
if(legendary){
playerColor=`hsl(${Date.now()/10%360},100%,50%)`;
}

ctx.fillStyle=playerColor;
ctx.fillRect(player.x,player.y,60,50);

/* UI */
ui.innerHTML="🏆 "+score+" ❤️ "+lives+" 💰 "+coins;

requestAnimationFrame(update);
}

</script>
</body>
</html>
