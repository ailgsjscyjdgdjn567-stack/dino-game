<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sky Master: Infinite World Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; background: linear-gradient(to bottom, #4ca1af, #c4e0e5); }
        
        #device-select, #hangar {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; color: white;
        }
        #hangar { background: rgba(0,0,0,0.95); display: none; flex-wrap: wrap; flex-direction: row; }

        .choice-btn { padding: 20px 40px; margin: 10px; font-size: 20px; cursor: pointer; border: none; border-radius: 10px; background: #3498db; color: white; }
        .plane-card { width: 120px; height: 120px; margin: 8px; background: #2c3e50; border: 2px solid #7f8c8d; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }

        #ui { position: fixed; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 2px #000; pointer-events: none; z-index: 10; font-size: 14px; }
        .controls { position: fixed; top: 10px; right: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; z-index: 10; }
        .btn { padding: 6px; font-size: 9px; cursor: pointer; border: 1px solid white; border-radius: 4px; color: white; background: #333; }
        
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; z-index: 100; touch-action: none; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        #f-btn-mobile { position: fixed; bottom: 50px; right: 40px; width: 70px; height: 70px; background: #e67e22; border-radius: 50%; display: none; z-index: 100; color: white; font-weight: bold; border: 3px solid white; justify-content: center; align-items: center; }

        #chat { position: fixed; bottom: 10px; left: 180px; width: 150px; height: 80px; background: rgba(0,0,0,0.6); color: #00ff00; padding: 5px; border-radius: 8px; font-size: 10px; overflow: hidden; z-index: 5; }
    </style>
</head>
<body>

<div id="device-select">
    <h1>ВЫБЕРИТЕ УСТРОЙСТВО</h1>
    <button class="choice-btn" onclick="setDevice('pc')">💻 КОМПЬЮТЕР</button>
    <button class="choice-btn" onclick="setDevice('mobile')">📱 ТЕЛЕФОН</button>
</div>

<div id="hangar">
    <h1 style="width: 100%; text-align: center; font-size: 20px;">ВЫБЕРИТЕ САМОЛЕТ</h1>
    <script>
        const colors = ['white', 'yellow', 'lightgray', 'cyan', 'red', 'lime', 'orange', 'blue', 'purple'];
        const names = ['Цессна', 'Джет', 'Боинг', 'Миг-29', 'МЧС', 'Ан-2', 'Грузовой', 'AirForce', 'UFO'];
        for(let i=0; i<9; i++) {
            document.write(`<div class="plane-card" onclick="selectPlane(${i})">
                <div style="width:40px; height:12px; background:${colors[i]}; margin-bottom:8px;"></div>
                <span style="font-size:12px;">${names[i]}</span>
            </div>`);
        }
    </script>
</div>

<div id="joystick-container"><div id="joystick-stick"></div></div>
<div id="f-btn-mobile" onclick="toggleChassis()">F</div>

<div id="ui">
    <div id="p-name" style="font-weight: bold; color: yellow;"></div>
    <div>H: <span id="alt">0</span> | S: <span id="speed">0</span></div>
</div>

<div class="controls">
    <button class="btn" onclick="trigger('fire')">🔥 Пожар</button>
    <button class="btn" onclick="trigger('ufo')">🛸 НЛО</button>
    <button class="btn" onclick="trigger('storm')">⛈️ Шторм</button>
    <button class="btn" onclick="trigger('birds')">🦅 Птицы</button>
    <button class="btn" onclick="trigger('engine')">⚙️ Отказ</button>
    <button class="btn" onclick="trigger('ghost')">👻 Призрак</button>
    <button class="btn" onclick="trigger('meteor')">☄️ Метеор</button>
    <button class="btn" onclick="trigger('alien')">👽 Атака</button>
    <button class="btn" onclick="trigger('chaos')">💀 ХАОС</button>
</div>

<div id="chat"><div id="msgs"></div></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const joystick = document.getElementById('joystick-container');
const stick = document.getElementById('joystick-stick');

let deviceType = 'pc';
let plane = { x: 500, y: 300, angle: 0, speed: 7, targetSpeed: 7, vx: 0, vy: 0, alive: true, engineOk: true, chassis: false, parts: [], fires: [], color: 'white', size: 20 };
let firetruck = { x: -2000, active: false };
let cameraX = 0, cameraY = 0, shake = 0;
let buildings = [];

function setDevice(type) {
    deviceType = type;
    document.getElementById('device-select').style.display = 'none';
    document.getElementById('hangar').style.display = 'flex';
    if(type === 'mobile') {
        joystick.style.display = 'block';
        document.getElementById('f-btn-mobile').style.display = 'flex';
    }
}

function selectPlane(id) {
    plane.color = colors[id];
    plane.size = 15 + id * 2;
    document.getElementById('p-name').innerText = names[id];
    document.getElementById('hangar').style.display = 'none';
    initWorld();
}

function initWorld() {
    // Делаем землю ОЧЕНЬ большой
    for(let i=-20000; i<20000; i+=150) {
        // Пропускаем реку и аэропорты для домов
        let inRiver = (i > -200 && i < 1200);
        let inAirportL = (i > -3600 && i < -2400);
        let inAirportR = (i > 4400 && i < 5600);
        
        if (!inRiver && !inAirportL && !inAirportR && Math.random() > 0.5) {
            buildings.push({x: i, w: 30+Math.random()*30, h: 20+Math.random()*60});
        }
    }
}

function toggleChassis() { plane.chassis = !plane.chassis; say(plane.chassis ? "Шасси выпущены" : "Шасси убраны"); }
function trigger(type) { shake = 20; if(type==='fire') {plane.engineOk=false; plane.targetSpeed=1;} }
function say(txt) { const m = document.getElementById('msgs'); m.innerHTML = `<div>${txt}</div>` + m.innerHTML; }

// Управление
window.addEventListener('mousemove', (e) => {
    if(deviceType === 'pc' && plane.alive) {
        plane.angle = Math.atan2(e.clientY - (plane.y - cameraY), e.clientX - (plane.x - cameraX));
    }
});

let joyActive = false;
joystick.addEventListener('touchstart', (e) => { joyActive = true; });
window.addEventListener('touchmove', (e) => {
    if(joyActive && plane.alive) {
        const rect = joystick.getBoundingClientRect();
        const touch = e.touches[0];
        const dx = touch.clientX - (rect.left + rect.width/2);
        const dy = touch.clientY - (rect.top + rect.height/2);
        const dist = Math.min(60, Math.sqrt(dx*dx + dy*dy));
        const angle = Math.atan2(dy, dx);
        stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        plane.angle = angle;
    }
});
window.addEventListener('touchend', () => { joyActive = false; stick.style.transform = 'translate(0,0)'; });

function update() {
    if(plane.alive && buildings.length > 0) {
        plane.speed += (plane.targetSpeed - plane.speed) * 0.01;
        plane.vx += (Math.cos(plane.angle) * plane.speed - plane.vx) * 0.05;
        plane.vy += (Math.sin(plane.angle) * plane.speed + 1.2 - plane.vy) * 0.05;
        plane.x += plane.vx; plane.y += plane.vy;
        if(plane.y > 585) {
            plane.alive = false;
            for(let i=0; i<20; i++) plane.parts.push({x: plane.x, y: plane.y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15});
            for(let i=0; i<3; i++) plane.fires.push({x: plane.x + (Math.random()-0.5)*40, y: 590});
            firetruck.active = true;
            firetruck.x = plane.x + (plane.x > 0 ? 1000 : -1000);
        }
    } else if(!plane.alive) {
        plane.parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.3; if(p.y > 600) p.y = 600; });
        if(firetruck.active) {
            let d = plane.x - firetruck.x;
            if(Math.abs(d) > 40) firetruck.x += Math.sign(d) * 3;
            else if(plane.fires.length > 0 && Math.random() > 0.9) plane.fires.pop();
            if(plane.fires.length === 0) setTimeout(()=>location.reload(), 2000);
        }
    }
    cameraX = plane.x - window.innerWidth/2;
    cameraY = plane.y - window.innerHeight/2;
    if(shake > 0) { cameraX += Math.random()*shake; cameraY += Math.random()*shake; shake *= 0.9; }
    document.getElementById('speed').innerText = Math.round(plane.speed * 40);
    document.getElementById('alt').innerText = Math.round(600 - plane.y);
}

function drawAirport(x) {
    ctx.fillStyle = "#333";
    ctx.fillRect(x, 595, 1200, 10); // Полоса
    ctx.fillStyle = "white";
    for(let i=0; i<12; i++) ctx.fillRect(x + 20 + i*100, 598, 40, 4); // Разметка
    ctx.font = "bold 20px Arial";
    ctx.fillText("RUNWAY", x + 500, 580);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, -cameraY);

    // ОГРОМНАЯ ЗЕМЛЯ
    ctx.fillStyle = "#27ae60";
    ctx.fillRect(-25000, 600, 50000, 1000);

    // РЕКА
    ctx.fillStyle = "#2980b9";
    ctx.fillRect(-200, 600, 1400, 1000);

    // АЭРОПОРТЫ
    drawAirport(-3600); // Левый
    drawAirport(4400);  // Правый

    buildings.forEach(b => { ctx.fillStyle = "#555"; ctx.fillRect(b.x, 600-b.h, b.w, b.h); });

    if(plane.alive) {
        ctx.save();
        ctx.translate(plane.x, plane.y); ctx.rotate(plane.angle);
        ctx.fillStyle = plane.color; ctx.fillRect(-plane.size, -4, plane.size*2, 8);
        ctx.fillStyle = "#888"; ctx.fillRect(-3, -plane.size, 6, plane.size*2);
        if(plane.chassis) { ctx.fillStyle="#000"; ctx.fillRect(-10, 4, 4, 5); ctx.fillRect(10, 4, 4, 5); }
        ctx.restore();
    } else {
        ctx.fillStyle = "black"; plane.parts.forEach(p => ctx.fillRect(p.x, p.y, 6, 6));
        ctx.fillStyle = "orange"; plane.fires.forEach(f => { ctx.beginPath(); ctx.arc(f.x, f.y - 10, 8, 0, Math.PI*2); ctx.fill(); });
    }

    if(firetruck.active) { ctx.fillStyle = "red"; ctx.fillRect(firetruck.x, 585, 30, 15); }
    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
draw();
</script>
</body>
</html>
