<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sky Crash Simulator: Passenger Edition</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
        }
        .btn { padding: 20px 40px; margin: 10px; font-size: 20px; cursor: pointer; border: none; border-radius: 50px; }
        .btn-pc { background: #3498db; color: white; }
        .btn-mobile { background: #e67e22; color: white; }

        #ui { position: fixed; top: 20px; right: 20px; text-align: right; color: white; text-shadow: 2px 2px 4px #000; }
        .hazard-btn { background: #c0392b; color: white; border: 2px solid white; padding: 8px 15px; margin: 5px; cursor: pointer; border-radius: 5px; }
        
        /* Чат пассажиров */
        #passenger-chat {
            position: fixed; bottom: 20px; left: 20px; width: 300px; height: 180px;
            background: rgba(0,0,0,0.7); color: #fff; padding: 15px; border-radius: 10px;
            border: 1px solid #555; display: flex; flex-direction: column;
        }
        #messages { flex-grow: 1; overflow-y: hidden; font-size: 14px; line-height: 1.4; }
        .name { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>SKY CRASH SIMULATOR</h1>
    <p>Выберите управление:</p>
    <button class="btn btn-pc" onclick="startGame('pc')">ПК (Мышь + Клавиша F)</button>
    <button class="btn btn-mobile" onclick="startGame('mobile')">ТЕЛЕФОН (Тачскрин)</button>
</div>

<div id="ui">
    <div style="font-size: 24px;">Скорость: <span id="speedVal">0</span> км/ч</div>
    <button class="hazard-btn" onclick="triggerEvent('fire')">🔥 Пожар двигателя</button>
    <button class="hazard-btn" onclick="triggerEvent('ufo')">🛸 Вызвать НЛО</button>
</div>

<div id="passenger-chat">
    <div style="border-bottom: 1px solid #777; margin-bottom: 5px; font-weight: bold;">📱 Внутрисамолетный чат</div>
    <div id="messages"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let device = 'pc';
let isGameRunning = false;

// Данные для чата
const passengerNames = ["Иван (3A)", "Мария (12B)", "Джон (5C)", "Стюардесса", "Пилот", "Бабуля", "Бизнесмен"];
const phrasesNormal = ["Прекрасный вид!", "Когда принесут еду?", "Надеюсь, мы прилетим вовремя.", "Обожаю летать.", "Вайфай платный?"];
const phrasesPanic = ["ЧТО ЭТО БЫЛ ЗА ЗВУК?!", "ПОЧЕМУ МЫ ПАДАЕМ?!", "МАМА!!!", "ГДЕ КИСЛОРОДНЫЕ МАСКИ?", "МЫ ВСЕ УМРЕМ!", "Я не успел написать завещание!"];

// Состояние игры
let plane = {
    x: 200, y: 300, angle: 0, speed: 6, targetSpeed: 6,
    alive: true, chassis: false, engineOk: true, parts: []
};

let cars = []; // Машины на мосту
for(let i=0; i<5; i++) { cars.push({x: Math.random()*2000, color: 'red'}); }

function startGame(type) {
    device = type;
    document.getElementById('overlay').style.display = 'none';
    isGameRunning = true;
    resize();
    setInterval(generatePassengerMessage, 4000); // Сообщения раз в 4 сек
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

// Управление
window.addEventListener('mousemove', (e) => {
    if(!isGameRunning || !plane.alive) return;
    const dx = e.clientX - plane.x;
    const dy = e.clientY - plane.y;
    plane.angle = Math.atan2(dy, dx);
});

window.addEventListener('keydown', (e) => {
    if(e.code === 'KeyF') plane.chassis = !plane.chassis;
});

// Логика чата
function addChatMessage(name, text) {
    const chat = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.innerHTML = `<span class="name">${name}:</span> ${text}`;
    chat.appendChild(msg);
    if(chat.childNodes.length > 6) chat.removeChild(chat.firstChild);
}

function generatePassengerMessage() {
    if(!isGameRunning) return;
    const name = passengerNames[Math.floor(Math.random()*passengerNames.length)];
    const list = plane.engineOk ? phrasesNormal : phrasesPanic;
    const text = list[Math.floor(Math.random()*list.length)];
    addChatMessage(name, text);
}

function triggerEvent(type) {
    if(type === 'fire') {
        plane.engineOk = false;
        plane.targetSpeed = 0;
        addChatMessage("СИСТЕМА", "ОТКАЗ ДВИГАТЕЛЯ!");
        setTimeout(() => addChatMessage("Пилот", "Спокойно, сохраняем спокойствие!"), 1000);
    }
}

function explode() {
    plane.alive = false;
    for(let i=0; i<15; i++) {
        plane.parts.push({x: plane.x, y: plane.y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15});
    }
    addChatMessage("СИСТЕМА", "СВЯЗЬ ПОТЕРЯНА...");
    setTimeout(() => {
        location.reload(); // Перезагрузка игры через 5 секунд
    }, 5000);
}

function draw() {
    if(!isGameRunning) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Рисуем воду/реку
    ctx.fillStyle = "#2980b9";
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

    // Рисуем Мост
    ctx.fillStyle = "#7f8c8d";
    ctx.fillRect(200, canvas.height - 60, 800, 15);
    
    // Машины на мосту
    ctx.fillStyle = "yellow";
    cars.forEach(c => {
        c.x += 2; if(c.x > 1000) c.x = 200;
        ctx.fillRect(c.x, canvas.height - 70, 20, 10);
    });

    if(plane.alive) {
        plane.speed += (plane.targetSpeed - plane.speed) * 0.01;
        plane.x += Math.cos(plane.angle) * plane.speed;
        plane.y += Math.sin(plane.angle) * plane.speed;

        if(plane.y > canvas.height - 60) explode();

        ctx.save();
        ctx.translate(plane.x, plane.y);
        ctx.rotate(plane.angle);
        ctx.fillStyle = "white";
        ctx.fillRect(-40, -10, 80, 20); // Фюзеляж
        ctx.fillStyle = "#bdc3c7";
        ctx.fillRect(-10, -35, 20, 70); // Крылья
        if(plane.chassis) {
            ctx.fillStyle = "black";
            ctx.fillRect(-20, 10, 5, 10); ctx.fillRect(15, 10, 5, 10);
        }
        if(!plane.engineOk) {
            ctx.fillStyle = "orange";
            ctx.beginPath(); ctx.arc(-45, 0, Math.random()*20, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
        document.getElementById('speedVal').innerText = Math.round(plane.speed * 50);
    } else {
        ctx.fillStyle = "red";
        plane.parts.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.3;
            ctx.fillRect(p.x, p.y, 8, 8);
        });
    }

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
