<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Disaster Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; color: white; }
        .panel { position: absolute; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; pointer-events: auto; border: 1px solid #444; }
        
        /* Панель катастроф */
        #disaster-panel { top: 10px; right: 10px; width: 180px; }
        .dis-btn { width: 100%; background: #c0392b; color: white; border: none; padding: 8px; margin-bottom: 5px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .dis-btn:hover { background: #ff4757; }
        
        /* Телеметрия */
        #stats { top: 10px; left: 10px; }
        #passengers { bottom: 20px; left: 50%; transform: translateX(-50%); width: 300px; text-align: center; }
        
        /* Джойстик для мобилок */
        #joystick-wrapper { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; pointer-events: auto; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.5; }

        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 40px; border-radius: 20px; text-align: center; display: none; pointer-events: auto; border: 2px solid #e74c3c; }
        .retry-btn { background: #27ae60; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="stats" class="panel">
        Высота: <span id="alt">0</span> м<br>
        Скорость: <span id="spd">0</span> км/ч
    </div>

    <div id="disaster-panel" class="panel">
        <div style="color: #f1c40f; font-weight: bold; margin-bottom: 10px; text-align: center;">🚨 КАТАСТРОФЫ</div>
        <button class="dis-btn" onclick="trigger('engine')">Отказ двигателя</button>
        <button class="dis-btn" onclick="trigger('fire')">Пожар на борту</button>
        <button class="dis-btn" onclick="trigger('wing')">Разрушение крыла</button>
        <button class="dis-btn" onclick="trigger('lightning')">Удар молнии</button>
        <button class="dis-btn" onclick="trigger('alien')">НЛО / Похищение</button>
    </div>

    <div id="passengers" class="panel">
        👥 Статус: <span id="p-status" style="color: #2ecc71;">Спокойны</span>
        <div id="p-scream" style="color: #ff4757; font-weight: bold; height: 20px;"></div>
    </div>

    <div id="joystick-wrapper"><div id="joystick-stick"></div></div>

    <div id="game-over">
        <h1 id="death-reason" style="color: #e74c3c;">САМОЛЕТ УНИЧТОЖЕН</h1>
        <p id="death-desc"></p>
        <button class="retry-btn" onclick="location.reload()">НОВЫЙ РЕЙС</button>
    </div>
</div>

<script>
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// --- Настройки ---
let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if(isMobile) document.getElementById('joystick-wrapper').style.display = 'block';

let plane = {
    x: 300, y: canvas.height/2,
    angle: 0, speed: 5, targetAngle: 0,
    broken: false, fire: false, wingLost: false,
    parts: [], screamTimer: 0
};

let mouse = { x: 300, y: canvas.height/2 };
let joy = { x: 0, y: 0, active: false };
let worldX = 0;
let time = 0;

// --- Управление ---
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };

const joyWrapper = document.getElementById('joystick-wrapper');
const joyStick = document.getElementById('joystick-stick');

joyWrapper.ontouchmove = (e) => {
    e.preventDefault();
    let rect = joyWrapper.getBoundingClientRect();
    let touch = e.touches[0];
    let tx = touch.clientX - rect.left - 60;
    let ty = touch.clientY - rect.top - 60;
    let dist = Math.sqrt(tx*tx + ty*ty);
    if(dist > 50) { tx *= 50/dist; ty *= 50/dist; }
    joyStick.style.transform = `translate(${tx}px, ${ty}px)`;
    joy.x = tx/50; joy.y = ty/50; joy.active = true;
};
joyWrapper.ontouchend = () => {
    joyStick.style.transform = `translate(0, 0)`;
    joy.active = false;
};

// --- Функции ---
function trigger(type) {
    if(plane.broken) return;
    plane.broken = true;
    let reason = "";
    
    if(type === 'engine') { reason = "Двигатели заглохли!"; plane.speed = 2; }
    if(type === 'fire') { reason = "Пожар в хвосте!"; plane.fire = true; }
    if(type === 'wing') { reason = "Левое крыло оторвано!"; plane.wingLost = true; }
    if(type === 'lightning') { reason = "Прямое попадание молнии!"; }
    if(type === 'alien') { reason = "НЛО разрезал корпус!"; }

    document.getElementById('p-status').innerText = "ПАНИКА!!!";
    document.getElementById('p-status').style.color = "red";
    document.getElementById('game-over').style.display = 'block';
    document.getElementById('death-desc').innerText = reason;
}

function update() {
    if(!plane.broken) {
        if(!isMobile) {
            let dx = mouse.x - plane.x;
            let dy = mouse.y - plane.y;
            plane.targetAngle = Math.atan2(dy, dx);
            plane.speed = Math.min(10, Math.sqrt(dx*dx + dy*dy) / 20);
        } else if(joy.active) {
            plane.targetAngle = Math.atan2(joy.y, joy.x);
            plane.speed = 8;
        }

        // Плавный поворот
        let diff = plane.targetAngle - plane.angle;
        while(diff < -Math.PI) diff += Math.PI*2;
        while(diff > Math.PI) diff -= Math.PI*2;
        plane.angle += diff * 0.05;

        plane.y += Math.sin(plane.angle) * plane.speed;
        worldX += Math.cos(plane.angle) * plane.speed;

        // Лимит космоса
        if(plane.y < -500) trigger('space');
        // Земля
        if(plane.y > canvas.height - 80) {
            if(plane.speed > 3) trigger('crash');
            else plane.y = canvas.height - 80;
        }
    } else {
        plane.y += 5; // Падение
        plane.angle += 0.1;
        plane.speed *= 0.95;
    }

    // Пассажиры кричат
    if(plane.broken || plane.y < 100 || plane.y > canvas.height - 200) {
        plane.screamTimer++;
        if(plane.screamTimer % 30 === 0) {
            const screams = ["ААААА!", "МЫ ПАДАЕМ!", "ГДЕ ПАРАШЮТ?!", "ГОСПОДИ!", "МАМА!"];
            document.getElementById('p-scream').innerText = screams[Math.floor(Math.random()*screams.length)];
        }
    }

    time += 0.002;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    // 1. Небо
    let altFactor = Math.max(0, 1 - (plane.y + 500) / 1500);
    let dayNight = (Math.sin(time) + 1) / 2;
    
    let r = Math.floor(100 * (1-altFactor) * (1-dayNight));
    let g = Math.floor(180 * (1-altFactor) * (1-dayNight));
    let b = Math.floor(255 * (1-altFactor));
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0,0,canvas.width, canvas.height);

    // 2. Светила
    ctx.fillStyle = dayNight > 0.5 ? "#eee" : "#f1c40f";
    ctx.beginPath();
    ctx.arc(canvas.width - 150, 150 + Math.cos(time)*100, 40, 0, Math.PI*2);
    ctx.fill();

    // 3. Облака (Параллакс)
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for(let i=0; i<8; i++) {
        let cx = (i * 500 - worldX * 0.3) % (canvas.width + 400);
        if(cx < -200) cx += canvas.width + 400;
        ctx.beginPath();
        ctx.arc(cx, 100 + i*80, 40, 0, Math.PI*2);
        ctx.arc(cx+40, 100 + i*80, 50, 0, Math.PI*2);
        ctx.fill();
    }

    // 4. Земля и города
    ctx.fillStyle = "#1e3799"; // Горизонт
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    
    for(let i=0; i<15; i++) {
        let gx = (i * 250 - worldX) % (canvas.width + 500);
        if(gx < -250) gx += canvas.width + 500;
        
        // Здания
        ctx.fillStyle = "#2f3542";
        ctx.fillRect(gx, canvas.height - 180, 60, 80);
        ctx.fillStyle = "#f1c40f";
        ctx.fillRect(gx+10, canvas.height-170, 10, 10); // Окна
        
        // Машины
        ctx.fillStyle = "red";
        ctx.fillRect(gx + (time*1000 % 200), canvas.height - 40, 15, 8);
        
        // Аэропорт
        if(i % 7 === 0) {
            ctx.fillStyle = "#57606f";
            ctx.fillRect(gx+100, canvas.height - 105, 300, 10);
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            ctx.fillText("AIRPORT - LAND HERE", gx+150, canvas.height - 115);
        }
    }

    // 5. Самолет
    ctx.save();
    ctx.translate(plane.x, plane.y);
    ctx.rotate(plane.angle);
    
    // Эффекты
    if(plane.fire) {
        ctx.fillStyle = "orange";
        ctx.beginPath(); ctx.arc(-30, 0, 15 + Math.random()*10, 0, Math.PI*2); ctx.fill();
    }

    // Корпус
    ctx.fillStyle = "#f1f2f6";
    ctx.beginPath();
    ctx.ellipse(0, 0, 40, 12, 0, 0, Math.PI*2);
    ctx.fill();
    
    // Крылья
    if(!plane.wingLost) {
        ctx.fillStyle = "#ced6e0";
        ctx.fillRect(-10, -30, 15, 60);
    }
    
    // Кабина
    ctx.fillStyle = "#2f3542";
    ctx.beginPath();
    ctx.arc(25, -2, 8, 0, Math.PI*2);
    ctx.fill();
    
    ctx.restore();

    // UI
    document.getElementById('alt').innerText = Math.floor(Math.max(0, (canvas.height - 100 - plane.y)));
    document.getElementById('spd').innerText = Math.floor(plane.speed * 45);
}

update();
</script>
</body>
</html>
