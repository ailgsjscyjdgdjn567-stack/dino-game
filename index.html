<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sky Crash Simulator - Follow Cam</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; }
        .controls { position: fixed; top: 10px; right: 10px; }
        .btn { pointer-events: auto; background: rgba(255,0,0,0.7); color: white; border: 1px solid white; padding: 10px; cursor: pointer; display: block; margin-bottom: 5px; }
        #chat { position: fixed; bottom: 10px; left: 10px; width: 250px; background: rgba(0,0,0,0.6); color: white; padding: 10px; border-radius: 5px; font-size: 13px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="instr">Управление: МЫШЬ (360°), F — Шасси</div>
    <div id="speed">Скорость: <span id="speedVal">0</span></div>
</div>

<div class="controls">
    <button class="btn" onclick="triggerFire()">🔥 ПОЖАР ДВИГАТЕЛЯ</button>
    <button class="btn" onclick="triggerUFO()" style="background: #8e44ad;">🛸 ВЫЗВАТЬ НЛО</button>
</div>

<div id="chat"><b>Чат пассажиров:</b><div id="msgs"></div></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let plane = {
    x: 500, y: 300, angle: 0, speed: 7, targetSpeed: 7,
    alive: true, chassis: false, engineOk: true, 
    width: 60, height: 20, parts: []
};

let worldWidth = 10000; // Огромный мир
let cameraX = 0;
let cameraY = 0;

// Чат
const names = ["Анна", "Петр", "Макс", "Олег", "Юля"];
function say(txt) {
    const m = document.getElementById('msgs');
    m.innerHTML += `<div><b>${names[Math.floor(Math.random()*names.length)]}:</b> ${txt}</div>`;
    if(m.childNodes.length > 5) m.removeChild(m.firstChild);
}

// Управление
window.addEventListener('mousemove', (e) => {
    if(!plane.alive) return;
    // Учитываем положение камеры при расчете угла
    const dx = e.clientX - (plane.x - cameraX);
    const dy = e.clientY - (plane.y - cameraY);
    plane.angle = Math.atan2(dy, dx);
});

window.addEventListener('keydown', (e) => {
    if(e.code === 'KeyF') plane.chassis = !plane.chassis;
});

function triggerFire() { 
    plane.engineOk = false; plane.targetSpeed = 0; 
    say("ПОЧЕМУ ДВИГАТЕЛЬ ГОРЯЧИЙ?!");
}

function triggerUFO() { say("СМОТРИТЕ! ЧТО ЭТО В НЕБЕ? 🛸"); }

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function update() {
    if (plane.alive) {
        plane.speed += (plane.targetSpeed - plane.speed) * 0.01;
        plane.x += Math.cos(plane.angle) * plane.speed;
        plane.y += Math.sin(plane.angle) * plane.speed;

        // Проверка столкновения с землей (высота 600)
        if (plane.y > 580) {
            plane.alive = false;
            say("ААААААА!!!!");
            setTimeout(() => location.reload(), 4000);
        }
    } else {
        if(plane.parts.length === 0) {
            for(let i=0; i<20; i++) plane.parts.push({x: plane.x, y: plane.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10});
        }
        plane.parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; });
    }

    // Камера следует за самолетом
    cameraX = plane.x - canvas.width / 2;
    cameraY = plane.y - canvas.height / 2;
    document.getElementById('speedVal').innerText = Math.round(plane.speed * 10);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cameraX, -cameraY);

    // Рисуем РЕКУ (бесконечную)
    ctx.fillStyle = "#2980b9";
    ctx.fillRect(-5000, 600, 15000, 200);

    // Рисуем ЗЕМЛЮ (Берега)
    ctx.fillStyle = "#27ae60";
    ctx.fillRect(-5000, 600, 4000, 200); // Левый берег
    ctx.fillRect(1000, 600, 4000, 200);  // Правый берег

    // МОСТ через реку
    ctx.fillStyle = "#7f8c8d";
    ctx.fillRect(0, 590, 1000, 20);
    // Машинки на мосту
    ctx.fillStyle = "white";
    for(let i=0; i<5; i++) {
        ctx.fillRect((Date.now()/20 + i*200) % 1000, 580, 15, 10);
    }

    // Аэропорт (Далеко слева)
    ctx.fillStyle = "#333";
    ctx.fillRect(-3000, 595, 600, 10);
    ctx.fillStyle = "yellow";
    ctx.fillText("AIRPORT", -2800, 580);

    // САМОЛЕТ
    if (plane.alive) {
        ctx.save();
        ctx.translate(plane.x, plane.y);
        ctx.rotate(plane.angle);
        ctx.fillStyle = "white";
        ctx.fillRect(-30, -10, 60, 20); // корпус
        ctx.fillStyle = "#bdc3c7";
        ctx.fillRect(-5, -30, 10, 60); // крылья
        if(plane.chassis) {
            ctx.fillStyle = "black";
            ctx.fillRect(-15, 10, 4, 8); ctx.fillRect(10, 10, 4, 8);
        }
        if(!plane.engineOk) {
            ctx.fillStyle = "orange";
            ctx.beginPath(); ctx.arc(-35, 0, 10 + Math.random()*10, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    } else {
        ctx.fillStyle = "red";
        plane.parts.forEach(p => ctx.fillRect(p.x, p.y, 8, 8));
    }

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

setInterval(() => { if(plane.alive) say(plane.engineOk ? "Красиво летим!" : "ПОМОГИТЕ!"); }, 5000);
draw();
</script>
</body>
</html>
