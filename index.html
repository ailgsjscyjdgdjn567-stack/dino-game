<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Survival: Survivors & Blood Loss</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 12px; border: 1px solid #0f0; pointer-events: none; border-radius: 5px; font-family: monospace; z-index: 10; }
        #death-log { position: absolute; top: 10px; right: 10px; color: #ff4d4d; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #ff4d4d; width: 200px; max-height: 80vh; overflow-y: auto; display: none; font-size: 12px; z-index: 100; }
        #cabin-chatter { position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); color: #fff; text-shadow: 2px 2px #000; font-size: 20px; text-align: center; pointer-events: none; width: 90%; font-weight: bold; }
        .dis-btn { position: absolute; top: 150px; right: 10px; background: #c0392b; color: white; border: 1px solid #eee; padding: 10px; cursor: pointer; border-radius: 4px; z-index: 20; }
    </style>
</head>
<body>

<div id="ui">
    ДИСТАНЦИЯ: <span id="dist">0</span> км<br>
    ВЫСОТА: <span id="alt">0</span> м<br>
    FPS: <span id="fps">0</span>
</div>

<div id="death-log">
    <b style="color:white">ОТЧЕТ О ПАССАЖИРАХ:</b><br><hr>
    <div id="log-content"></div>
</div>

<button class="dis-btn" onclick="triggerCrash()">САМОЛИКВИДАЦИЯ</button>
<div id="cabin-chatter"></div>

<script>
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);
const logBox = document.getElementById('death-log');
const logContent = document.getElementById('log-content');

let gameActive = true, worldX = 0, cameraX = 0;
let plane = { x: 300, y: 300, angle: 0, speed: 8, broken: false, parts: [] };
let survivors = [], buildings = [], bloodPuddles = [];
let names = ["Иван", "Мария", "Алекс", "Дмитрий", "Елена", "Петр", "Ольга", "Сергей", "Анна", "Виктор", "Макс", "Кевин", "Лиза", "Сара"];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

// Генерация зданий
for(let i=0; i<30; i++) buildings.push({ x: i * 2900 + 1500, w: 100 + Math.random()*100, h: 150 + Math.random()*350 });

window.onmousemove = (e) => { if(!plane.broken) { plane.targetY = e.clientY; plane.targetX = e.clientX; } };

function triggerCrash() { handleCrash("ОТКАЗ СИСТЕМ"); }

function handleCrash(reason) {
    if(plane.broken) return;
    plane.broken = true;
    gameActive = false;
    logBox.style.display = 'block';

    // Создание пассажиров
    let passengerCount = 8 + Math.floor(Math.random() * 6);
    for(let i = 0; i < passengerCount; i++) {
        let isDeadImmediately = Math.random() > 0.6;
        let survivor = {
            name: names[Math.floor(Math.random()*names.length)] + " " + (i + 1),
            x: worldX + plane.x + (Math.random()-0.5)*200,
            y: canvas.height - 100,
            color: `hsl(${Math.random()*360}, 70%, 50%)`,
            dead: isDeadImmediately,
            health: isDeadImmediately ? 0 : (20 + Math.random()*80),
            bleeding: Math.random() > 0.3,
            screamTimer: Math.random() * 100
        };
        survivors.push(survivor);
        updateLog();
    }
}

function updateLog() {
    logContent.innerHTML = survivors.map(s => 
        `<div style="color:${s.dead ? '#ff4d4d' : '#4dff4d'}">
            ${s.dead ? '💀' : '👤'} ${s.name} - ${s.dead ? 'МЕРТВ' : 'РАНЕН ('+Math.floor(s.health)+'%)'}
        </div>`
    ).join('');
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if(!plane.broken) {
        worldX += plane.speed;
        let dy = (plane.targetY || 300) - plane.y;
        plane.y += dy * 0.05;
        cameraX = worldX - 200;

        // Проверка столкновения со зданиями
        buildings.forEach(b => {
            let bx = b.x - cameraX;
            if(bx > 250 && bx < 350 && plane.y > canvas.height - 100 - b.h) handleCrash("СТОЛКНОВЕНИЕ");
        });
    }

    // Рисуем небо
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Рисуем землю
    ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

    // Здания
    buildings.forEach(b => {
        let bx = b.x - cameraX;
        if(bx > -200 && bx < canvas.width + 200) {
            ctx.fillStyle = "#34495e"; ctx.fillRect(bx, canvas.height - 100 - b.h, b.w, b.h);
        }
    });

    // Кровь на земле
    bloodPuddles.forEach(p => {
        ctx.fillStyle = "rgba(200, 0, 0, 0.6)";
        ctx.beginPath(); ctx.arc(p.x - cameraX, p.y, p.r, 0, Math.PI*2); ctx.fill();
    });

    // Пассажиры
    survivors.forEach(s => {
        let sx = s.x - cameraX;
        if(sx > -50 && sx < canvas.width + 50) {
            // Тело
            ctx.fillStyle = s.color;
            ctx.fillRect(sx - 5, s.y - 15, 10, 15);
            // Голова
            ctx.fillStyle = "#ffdbac";
            ctx.fillRect(sx - 4, s.y - 22, 8, 8);
            // Глаза
            ctx.fillStyle = "white";
            ctx.fillRect(sx - 3, s.y - 20, 2, 2); ctx.fillRect(sx + 1, s.y - 20, 2, 2);
            ctx.fillStyle = "black";
            ctx.fillRect(sx - 2, s.y - 19, 1, 1); ctx.fillRect(sx + 2, s.y - 19, 1, 1);

            if(!s.dead) {
                // Логика потери крови
                if(s.bleeding) {
                    s.health -= 0.05;
                    if(Math.random() > 0.98) bloodPuddles.push({x: s.x, y: s.y - 2, r: 2 + Math.random()*3});
                    if(s.health <= 0) { s.dead = true; updateLog(); }
                }
                // Крики
                s.screamTimer++;
                if(s.screamTimer > 100) {
                    ctx.fillStyle = "white"; ctx.font = "10px Arial";
                    ctx.fillText(s.bleeding ? "ПОМОГИТЕ! КРОВЬ!" : "КТО-НИБУДЬ!", sx - 20, s.y - 30);
                    if(s.screamTimer > 150) s.screamTimer = 0;
                }
            } else {
                // Труп (лежит)
                ctx.save();
                ctx.translate(sx, s.y); ctx.rotate(Math.PI/2);
                ctx.fillStyle = s.color; ctx.fillRect(0, -5, 15, 10);
                ctx.restore();
            }
        }
    });

    // Самолет
    if(!plane.broken) {
        ctx.fillStyle = "white";
        ctx.fillRect(plane.x - 40, plane.y - 10, 80, 20);
    }

    document.getElementById('dist').innerText = Math.floor(worldX/100);
    document.getElementById('alt').innerText = Math.floor(canvas.height - 100 - plane.y);
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
