<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Survival: 360 Pro Pilot</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; text-align: center; }
        .btn { padding: 15px 40px; margin: 10px; font-size: 18px; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 12px; border: 1px solid #0f0; pointer-events: none; border-radius: 5px; font-family: monospace; z-index: 10; line-height: 1.4; }
        #disaster-ui { position: absolute; top: 10px; right: 10px; display: none; flex-direction: column; gap: 8px; z-index: 100; }
        .dis-btn { background: #c0392b; color: white; border: 1px solid #eee; padding: 8px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 4px; }
        #mobile-ui { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 100; }
        #joy-base { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; position: relative; }
        #joy-stick { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        .action-btn { width: 80px; height: 80px; background: #f1c40f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 3px solid #fff; }
        #death-log { position: absolute; top: 180px; right: 10px; color: #ff4d4d; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #ff4d4d; width: 180px; display: none; font-size: 11px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #f1c40f;">✈️ SKY SURVIVAL 360</h1>
    <p>Выберите режим управления:</p>
    <button class="btn" onclick="start('pc')">💻 ПК (Мышь + Клавиша F)</button>
    <button class="btn" onclick="start('mobile')">📱 СЕНСОР (Джойстик)</button>
</div>

<div id="ui">
    ДИСТАНЦИЯ: <span id="dist">0</span> км<br>
    ВЫСОТА: <span id="alt">0</span> м<br>
    ШАССИ: <span id="gear-status">УБРАНЫ</span>
</div>

<div id="disaster-ui">
    <button class="dis-btn" onclick="trigger('wing')">✂️ ОТРЫВ КРЫЛА</button>
    <button class="dis-btn" onclick="trigger('engine')">💥 ВЗРЫВ ДВИГАТЕЛЯ</button>
    <button class="dis-btn" onclick="trigger('alien')">🛸 ВЫЗВАТЬ НЛО</button>
    <button class="dis-btn" onclick="trigger('fire')">🔥 ПОЖАР В САЛОНЕ</button>
</div>

<div id="death-log"><div id="log-content"></div></div>

<div id="mobile-ui">
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div class="action-btn" onclick="toggleGear()">🎡</div>
</div>

<script>
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);

let isMobile = false, gameActive = false, worldX = 0, cameraX = 0;
let plane = { x: 400, y: 300, angle: 0, speed: 8, broken: false, wingBroken: false, engineExploded: false, gear: false, wingPart: null };
let buildings = [], clouds = [], debris = [], survivors = [], blood = [], cars = [], rivers = [];
let joy = { x: 0, y: 0, active: false };
let names = ["Алекс", "Мария", "Иван", "Сара", "Дмитрий", "Елена", "Петр", "Ольга"];
let phrases = ["МАМА!", "ГДЕ МЫ?", "ПОМОГИТЕ!", "КРОВЬ!", "Я НЕ ВИЖУ!", "КТО-НИБУДЬ!", "МНЕ СТРАШНО!"];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function start(mode) {
    isMobile = (mode === 'mobile');
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('disaster-ui').style.display = 'flex';
    if(isMobile) document.getElementById('mobile-ui').style.display = 'flex';
    initWorld();
    gameActive = true;
    loop();
}

function initWorld() {
    for(let i=0; i<20; i++) clouds.push({ x: Math.random()*30000, y: Math.random()*400, w: 80+Math.random()*100 });
    for(let i=0; i<15; i++) rivers.push({ x: i * 8000 + 4000, w: 1300 });
    for(let i=0; i<150; i++) {
        let bx = i * 700 + 1000;
        if(!rivers.some(r => bx > r.x - 200 && bx < r.x + r.w + 200)) {
            buildings.push({ x: bx, w: 100+Math.random()*100, h: 150+Math.random()*400 });
        }
    }
}

// Управление
window.onmousemove = (e) => { if(!plane.broken && !isMobile) { plane.targetX = e.clientX; plane.targetY = e.clientY; } };
window.onkeydown = (e) => { if(e.code === 'KeyF') toggleGear(); };
function toggleGear() { 
    plane.gear = !plane.gear; 
    document.getElementById('gear-status').innerText = plane.gear ? "ВЫПУЩЕНЫ" : "УБРАНЫ";
    document.getElementById('gear-status').style.color = plane.gear ? "#f1c40f" : "#0f0";
}

// Джойстик для телефона
const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');
jBase.ontouchmove = (e) => {
    e.preventDefault(); let r = jBase.getBoundingClientRect();
    let tx = e.touches[0].clientX - r.left - 60, ty = e.touches[0].clientY - r.top - 60;
    let d = Math.sqrt(tx*tx + ty*ty); if(d > 50) { tx *= 50/d; ty *= 50/d; }
    jStick.style.transform = `translate(${tx}px, ${ty}px)`;
    joy.x = tx/50; joy.y = ty/50; joy.active = true;
};
jBase.ontouchend = () => { jStick.style.transform = `translate(0,0)`; joy.active = false; };

function trigger(type) {
    if(type === 'wing') { plane.wingBroken = true; plane.wingPart = { x: worldX + plane.x, y: plane.y, vx: 5, vy: -2, rot: 0 }; }
    if(type === 'engine') { plane.engineExploded = true; }
}

function handleCrash() {
    if(plane.broken) return; plane.broken = true;
    document.getElementById('death-log').style.display = 'block';
    for(let i=0; i<30; i++) debris.push({ x: worldX+plane.x, y: plane.y, vx: (Math.random()-0.5)*25, vy: -15*Math.random(), w: 20, h: 10, rot: 0, rv: 0.1, color: Math.random()>0.5?'#ddd':'#999' });
    for(let i=0; i<8; i++) survivors.push({ name: names[i%names.length], x: worldX+plane.x, y: plane.y, vx: (Math.random()-0.5)*15, vy: -12, color: `hsl(${Math.random()*360}, 70%, 50%)`, health: 100, dead: false, grounded: false, chat: "ААА!", timer: 0 });
    updateLog(); setTimeout(() => location.reload(), 15000);
}

function updateLog() {
    document.getElementById('log-content').innerHTML = survivors.map(s => `<div style="color:${s.dead?'#f00':'#0f0'}">${s.dead?'💀':'👤'} ${s.name}</div>`).join('');
}

function loop() {
    if(!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if(!plane.broken) {
        // 360 управление
        let tx, ty;
        if(isMobile) {
            if(joy.active) { plane.angle = Math.atan2(joy.y, joy.x); worldX += Math.cos(plane.angle)*plane.speed; plane.y += Math.sin(plane.angle)*plane.speed; }
            else { worldX += plane.speed; }
        } else {
            tx = (plane.targetX || 400); ty = (plane.targetY || 300);
            let angleToMouse = Math.atan2(ty - plane.y, tx - 400);
            plane.angle += (angleToMouse - plane.angle) * 0.1;
            worldX += Math.cos(plane.angle) * plane.speed;
            plane.y += Math.sin(plane.angle) * plane.speed;
        }
        
        cameraX = worldX - 400;
        if(plane.wingBroken || plane.engineExploded) { plane.y += 4; plane.speed *= 0.999; }
        
        // Машины
        rivers.forEach(r => { if(Math.random()>0.99) cars.push({ x: r.x, y: canvas.height-125, speed: 3+Math.random()*2, color: 'red', broken: false }); });
        cars.forEach(c => {
            if(!c.broken && Math.abs((worldX+400)-c.x)<50 && Math.abs(plane.y-(canvas.height-125))<40) {
                c.broken = true; handleCrash();
            }
        });
        
        // Коллизии со зданиями
        buildings.forEach(b => {
            if(worldX+400 > b.x && worldX+400 < b.x+b.w && plane.y > canvas.height-100-b.h) handleCrash();
        });
        if(plane.y > canvas.height-100 || plane.y < -500) handleCrash();
    }

    // РИСОВАНИЕ
    ctx.fillStyle = "#1e3799"; ctx.fillRect(0,0,canvas.width, canvas.height); // Небо
    clouds.forEach(c => { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(c.x - cameraX*0.3, c.y, c.w, 0, Math.PI*2); ctx.fill(); });
    
    ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, canvas.height-100, canvas.width, 100); // Трава
    rivers.forEach(r => {
        let rx = r.x - cameraX;
        ctx.fillStyle = "#3498db"; ctx.fillRect(rx, canvas.height-100, r.w, 100);
        ctx.fillStyle = "#7f8c8d"; ctx.fillRect(rx, canvas.height-130, r.w, 30); // Мост
    });

    buildings.forEach(b => {
        let bx = b.x - cameraX;
        ctx.fillStyle = "#2f3640"; ctx.fillRect(bx, canvas.height-100-b.h, b.w, b.h);
        ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(bx+b.w/2, canvas.height-100-b.h, 4, 0, Math.PI*2); ctx.fill();
    });

    cars.forEach(c => { if(!c.broken) c.x += c.speed; ctx.fillStyle = c.color; ctx.fillRect(c.x-cameraX, c.y, 40, 20); });

    // Кровь и Обломки
    blood.forEach(p => { ctx.fillStyle = "rgba(200,0,0,0.6)"; ctx.beginPath(); ctx.arc(p.x - cameraX, p.y, p.r, 0, Math.PI*2); ctx.fill(); });
    debris.forEach(d => {
        d.x += d.vx; d.y += d.vy; d.vy += 0.5; d.rot += d.rv;
        if(d.y > canvas.height-100) { d.y = canvas.height-100; d.vx *= 0.8; }
        ctx.save(); ctx.translate(d.x - cameraX, d.y); ctx.rotate(d.rot);
        ctx.fillStyle = d.color; ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h); ctx.restore();
    });

    // Пассажиры
    survivors.forEach(s => {
        if(!s.grounded) { s.x += s.vx; s.y += s.vy; s.vy += 0.5; if(s.y > canvas.height-100) s.grounded = true; }
        else if(!s.dead) {
            s.health -= 0.1; s.timer++; if(Math.random()>0.8) blood.push({x:s.x, y:s.y, r:2+Math.random()*2});
            if(s.health <= 0) { s.dead = true; updateLog(); }
            if(s.timer % 130 === 0) s.chat = phrases[Math.floor(Math.random()*phrases.length)];
        }
        let sx = s.x - cameraX;
        ctx.fillStyle = s.color; ctx.fillRect(sx-5, s.y-15, 10, 15);
        ctx.fillStyle = "#ffdbac"; ctx.fillRect(sx-4, s.y-22, 8, 8);
        ctx.fillStyle = "white"; ctx.fillRect(sx-3, s.y-20, 2, 2); ctx.fillRect(sx+1, s.y-20, 2, 2); // ГЛАЗА
        if(!s.dead && s.grounded) { ctx.fillStyle = "white"; ctx.font = "10px monospace"; ctx.fillText(s.chat, sx-20, s.y-30); }
    });

    // САМОЛЕТ
    if(!plane.broken) {
        ctx.save(); ctx.translate(400, plane.y); ctx.rotate(plane.angle);
        // Шасси
        if(plane.gear) { ctx.fillStyle = "#333"; ctx.fillRect(-15, 10, 5, 10); ctx.fillRect(10, 10, 5, 10); ctx.beginPath(); ctx.arc(-12, 20, 4, 0, Math.PI*2); ctx.arc(12, 20, 4, 0, Math.PI*2); ctx.fill(); }
        // Крылья
        ctx.fillStyle = "gray"; ctx.fillRect(-10, -35, 20, plane.wingBroken ? 35 : 70);
        // Корпус
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.ellipse(0, 0, 45, 12, 0, 0, Math.PI*2); ctx.fill();
        // Взрыв двигателя
        if(plane.engineExploded) {
            ctx.fillStyle = "orange"; ctx.beginPath(); ctx.arc(-25, 0, 15+Math.random()*10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(-25, 0, 8, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    if(plane.wingPart) {
        plane.wingPart.y += 6; plane.wingPart.rot += 0.1;
        ctx.save(); ctx.translate(plane.wingPart.x-cameraX, plane.wingPart.y); ctx.rotate(plane.wingPart.rot);
        ctx.fillStyle = "gray"; ctx.fillRect(-10,0,20,40); ctx.restore();
    }

    document.getElementById('dist').innerText = Math.floor(worldX/100);
    document.getElementById('alt').innerText = Math.max(0, Math.floor(canvas.height-100-plane.y));
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
