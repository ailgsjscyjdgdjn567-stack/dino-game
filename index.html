<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Boss Battle</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial;background:black;}
canvas{display:none;margin:auto;background:linear-gradient(to top,#111,#000);}

#menu{
position:absolute;width:100%;height:100%;
background:url("menu.jpg") center/cover no-repeat;
display:flex;flex-direction:column;
justify-content:center;align-items:center;gap:20px;
}

#menu h1{color:white;font-size:40px;text-shadow:2px 2px 10px black;}

button{
padding:15px 40px;font-size:22px;border:none;
border-radius:10px;cursor:pointer;background:orange;color:black;
}

#info{
position:absolute;top:10px;left:10px;
color:white;font-size:20px;
}

#end{
position:absolute;width:100%;text-align:center;
top:120px;font-size:40px;color:white;display:none;
}
</style>
</head>
<body>

<div id="menu">
<h1>DINO BOSS BATTLE</h1>
<button onclick="startGame()">▶ Играть</button>
<button onclick="exitGame()">❌ Выйти</button>
</div>

<div id="info"></div>
<div id="end"></div>

<canvas id="gameCanvas" width="900" height="300"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let ground=240;
let gameRunning=false;
let score=0;
let lives=3;

let player={x:80,y:ground-60,vy:0,gravity:1,jump:-18,grounded:true};

let boss={x:900,y:ground-120,hp:15,speed:3};
let bullets=[];
let bossBullets=[];

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
gameRunning=true;
update();
}

function exitGame(){window.close();}

function drawStars(){
ctx.fillStyle="white";
for(let i=0;i<40;i++){
ctx.fillRect(Math.random()*900,Math.random()*300,2,2);
}
}

function drawDino(){
ctx.fillStyle="lime";
ctx.fillRect(player.x,player.y,50,40);
ctx.fillRect(player.x+40,player.y-20,30,30);
}

function drawBoss(){
ctx.fillStyle="purple";
ctx.fillRect(boss.x,boss.y,120,120);
}

function shoot(){
bullets.push({x:player.x+60,y:player.y+20});
}

function bossShoot(){
bossBullets.push({x:boss.x,y:boss.y+60});
}

setInterval(()=>{
if(gameRunning) bossShoot();
},1500);

function drawBullets(){
ctx.fillStyle="yellow";
bullets.forEach((b,i)=>{
b.x+=10;
ctx.fillRect(b.x,b.y,10,5);

if(b.x>boss.x&&b.x<boss.x+120&&b.y>boss.y&&b.y<boss.y+120){
boss.hp--;
score+=10;
bullets.splice(i,1);
if(boss.hp<=0) winGame();
}
});
}

function drawBossBullets(){
ctx.fillStyle="red";
bossBullets.forEach((b,i)=>{
b.x-=6;
ctx.fillRect(b.x,b.y,10,5);

if(
b.x>player.x&&
b.x<player.x+50&&
b.y>player.y&&
b.y<player.y+40
){
lives--;
bossBullets.splice(i,1);
if(lives<=0) gameOver();
}
});
}

function update(){
if(!gameRunning)return;

ctx.clearRect(0,0,900,300);
drawStars();

player.vy+=player.gravity;
player.y+=player.vy;

if(player.y>=ground-60){
player.y=ground-60;
player.vy=0;
player.grounded=true;
}

boss.x-=boss.speed;
if(boss.x<500) boss.x=900;

drawBoss();
drawBullets();
drawBossBullets();
drawDino();

document.getElementById("info").innerHTML=
"❤️ Жизни: "+lives+" | 🏆 Очки: "+score;

requestAnimationFrame(update);
}

function jump(){
if(player.grounded){
player.vy=player.jump;
player.grounded=false;
}
}

function winGame(){
gameRunning=false;
document.getElementById("end").style.display="block";
document.getElementById("end").innerHTML="👑 ТЫ ПОБЕДИЛ!";
}

function gameOver(){
gameRunning=false;
document.getElementById("end").style.display="block";
document.getElementById("end").innerHTML="💀 GAME OVER";
}

document.addEventListener("keydown",e=>{
if(e.code==="Space") jump();
if(e.code==="KeyF") shoot();
});

canvas.addEventListener("touchstart",()=>{
jump();
});
</script>

</body>
</html>
