<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Airplane Sandbox</title>
<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#87CEEB;
}

canvas{
display:none;
}

.menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
padding:10px 16px;
margin:6px;
font-size:16px;
border:none;
border-radius:6px;
background:#2d89ef;
color:white;
cursor:pointer;
}

#hud{
position:fixed;
top:10px;
left:10px;
background:#ffffffcc;
padding:10px;
border-radius:8px;
display:none;
}

#minimap{
position:fixed;
right:10px;
bottom:10px;
width:200px;
height:120px;
background:#ffffffcc;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div id="menu" class="menu">
<h2>✈️ Airplane Sandbox</h2>
<button onclick="openHangar()">Играть</button>
</div>

<div id="hangar" class="menu" style="display:none">
<h2>Ангар</h2>

<button onclick="startGame('fighter')">Истребитель</button>
<button onclick="startGame('cargo')">Грузовой</button>
<button onclick="startGame('jet')">Реактивный</button>
<button onclick="startGame('old')">Старый самолёт</button>

</div>

<div id="hud">
W / S — тяга<br>
F — шасси<br>
Мышка — управление
</div>

<canvas id="game"></canvas>
<canvas id="minimap"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const minimap = document.getElementById("minimap")
const mctx = minimap.getContext("2d")

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
}

window.addEventListener("resize", resize)

let worldWidth = 6000
let worldHeight = 2000

let camera = {x:0,y:0}

let plane
let planeType = "fighter"

let mouse = {x:0,y:0}

let clouds = []
let debris = []

let runway = {x:2000,y:1800,width:500,height:20}

function openHangar(){

document.getElementById("menu").style.display="none"
document.getElementById("hangar").style.display="block"

}

function startGame(type){

planeType = type

document.getElementById("hangar").style.display="none"
document.getElementById("hud").style.display="block"

canvas.style.display="block"
minimap.style.display="block"

resize()

initPlane()
createClouds()

loop()

}

function initPlane(){

let stats={
fighter:{speed:1.2,color:"gray"},
cargo:{speed:0.7,color:"darkgreen"},
jet:{speed:1.7,color:"black"},
old:{speed:0.9,color:"brown"}
}

let s=stats[planeType]

plane={
x:300,
y:300,
vx:0,
vy:0,
thrust:0,
angle:0,
gear:true,
hp:100,
speed:s.speed,
color:s.color
}

}

function createClouds(){

for(let i=0;i<40;i++){

clouds.push({
x:Math.random()*worldWidth,
y:Math.random()*800,
size:40+Math.random()*80
})

}

}

document.addEventListener("mousemove",e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

document.addEventListener("keydown",e=>{

if(e.key==="w") plane.thrust+=0.05
if(e.key==="s") plane.thrust-=0.05
if(e.key==="f") plane.gear=!plane.gear

})

function update(){

plane.angle=Math.atan2(
mouse.y-(plane.y-camera.y),
mouse.x-(plane.x-camera.x)
)

plane.vx+=Math.cos(plane.angle)*plane.thrust*plane.speed
plane.vy+=Math.sin(plane.angle)*plane.thrust*plane.speed

plane.vy+=0.2

plane.x+=plane.vx
plane.y+=plane.vy

plane.vx*=0.99
plane.vy*=0.99

if(plane.y>1800){

if(Math.abs(plane.vy)>6 || !plane.gear){
crashPlane()
}

plane.y=1800
plane.vy=0

}

camera.x=plane.x-canvas.width/2
camera.y=plane.y-canvas.height/2

}

function crashPlane(){

if(plane.hp<=0) return

plane.hp=0

for(let i=0;i<12;i++){

debris.push({
x:plane.x,
y:plane.y,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8
})

}

}

function updateDebris(){

debris.forEach(d=>{
d.vy+=0.2
d.x+=d.vx
d.y+=d.vy
})

}

function drawClouds(){

ctx.fillStyle="white"

clouds.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x-camera.x,c.y-camera.y,c.size,0,Math.PI*2)
ctx.fill()
})

}

function drawRunway(){

ctx.fillStyle="#555"
ctx.fillRect(runway.x-camera.x,runway.y-camera.y,runway.width,runway.height)

}

function drawPlane(){

ctx.save()

ctx.translate(plane.x-camera.x,plane.y-camera.y)
ctx.rotate(plane.angle)

ctx.fillStyle=plane.color
ctx.fillRect(-25,-6,50,12)

ctx.fillStyle="red"
ctx.fillRect(-35,-3,10,6)

if(plane.gear){

ctx.fillStyle="black"
ctx.fillRect(-10,6,6,10)
ctx.fillRect(4,6,6,10)

}

ctx.restore()

}

function drawGround(){

ctx.fillStyle="#3c9a3c"
ctx.fillRect(-camera.x,1800-camera.y,worldWidth,200)

}

function drawDebris(){

ctx.fillStyle="black"

debris.forEach(d=>{
ctx.fillRect(d.x-camera.x,d.y-camera.y,6,6)
})

}

function drawMinimap(){

mctx.clearRect(0,0,minimap.width,minimap.height)

let scaleX=minimap.width/worldWidth
let scaleY=minimap.height/worldHeight

mctx.fillStyle="green"
mctx.fillRect(0,1800*scaleY,minimap.width,20)

mctx.fillStyle="red"
mctx.fillRect(plane.x*scaleX,plane.y*scaleY,4,4)

}

function drawHUD(){

ctx.fillStyle="black"

ctx.fillText("HP: "+plane.hp,20,20)
ctx.fillText("Thrust: "+plane.thrust.toFixed(2),20,40)
ctx.fillText("Gear: "+(plane.gear?"ON":"OFF"),20,60)

}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

update()
updateDebris()

drawClouds()
drawRunway()
drawGround()

if(plane.hp>0){
drawPlane()
}

drawDebris()
drawHUD()
drawMinimap()

requestAnimationFrame(loop)

}

</script>

</body>
</html>
