<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Flight Simulator 2026</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; }

        /* МЕНЮ */
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        .btn { padding: 15px 40px; margin: 10px; font-size: 18px; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 5px; }
        
        /* ИНТЕРФЕЙС */
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #0f0; pointer-events: none; display: none; }
        #disaster-ui { position: absolute; top: 10px; right: 10px; display: none; flex-direction: column; gap: 5px; }
        .dis-btn { background: #c0392b; color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer; font-size: 12px; }

        /* ПАССАЖИРЫ */
        #cabin-chatter { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); color: #fff; text-shadow: 2px 2px #000; font-style: italic; font-size: 18px; text-align: center; pointer-events: none; width: 80%; }

        /* МОБИЛЬНОЕ УПРАВЛЕНИЕ */
        #mobile-ui { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        #joy-base { width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; position: relative; }
        #joy-stick { width: 40px; height: 40px; background: #fff; border-radius: 50%; position: absolute; top: 30px; left: 30px; }
        .action-btn { width: 70px; height: 70px; background: #f1c40f; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 2px solid #fff; }

        #gear-status { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>SKY DISASTER SIMULATOR</h1>
    <p>Выберите устройство для калибровки систем:</p>
    <button class="btn" onclick="start('pc')">💻 КОМПЬЮТЕР (Мышь + F)</button>
    <button class="btn" onclick="start('mobile')">📱 ТЕЛЕФОН (Джойстик)</button>
</div>

<div id="ui">
    ВЫСОТА: <span id="alt">0</span> м<br>
    СКОРОСТЬ: <span id="spd">0</span> км/ч<br>
    ШАССИ: <span id="gear-status">УБРАНЫ</span>
</div>

<div id="disaster-ui">
    <button class="dis-btn" onclick="trigger('engine')">ОТКАЗ ДВИГАТЕЛЯ</button>
    <button class="dis-btn" onclick="trigger('fire')">ПОЖАР</button>
    <button class="dis-btn" onclick="trigger('wing')">КРЫЛО</button>
    <button class="dis-btn" onclick="trigger('lightning')">МОЛНИЯ</button>
    <button class="dis-btn" onclick="trigger('alien')">ВЫЗВАТЬ НЛО</button>
</div>

<div id="cabin-chatter"></div>

<div id="mobile-ui">
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div class="action-btn" onclick="toggleGear()">🎡</div>
</div>

<script>
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);
const chatterBox = document.getElementById('cabin-chatter');

let isMobile = false;
let gameActive = false;
let plane = {
    x: 200, y: 300, w: 80, h: 20,
    angle: 0, speed: 7, targetAngle: 0,
    gear: false, gearY: 0,
    engineOk: true, broken: false, fire: false, wingLost: false,
    timer: 0, deathTimer: -1,
    ufoActive: false, ufoX: -200, ufoY: 0
};

let worldX = 0;
let timeOfDay = 0;
let mouse = { x: 200, y: 300 };
let joy = { x: 0, y: 0, active: false };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function start(mode) {
    isMobile = (mode === 'mobile');
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    document.getElementById('disaster-ui').style.display = 'flex';
    if(isMobile) document.getElementById('mobile-ui').style.display = 'flex';
    gameActive = true;
    loop();
}

// --- УПРАВЛЕНИЕ ---
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onkeydown = (e) => { if(e.code === 'KeyF') toggleGear(); };

function toggleGear() {
    plane.gear = !plane.gear;
    document.getElementById('gear-status').innerText = plane.gear ? "ВЫПУЩЕНЫ" : "УБРАНЫ";
    document.getElementById('gear-status').style.color = plane.gear ? "#2ecc71" : "#f1c40f";
    say(plane.gear ? "Стюардесса: Подготовка к посадке..." : "Пилот: Шасси убраны, набираем ход.");
}

function trigger(type) {
    if(plane.deathTimer > 0) return;
    plane.deathTimer = 60 * 60; // 1 минута до полного разрушения
    
    if(type === 'engine') {
        plane.engineOk = false;
        say("ОБЪЯВЛЕНИЕ: Дамы и господа, у нас небольшая техническая заминка с двигателем...");
    }
    if(type === 'fire') { plane.fire = true; say("ПАССАЖИР: ЭЙ! ПОЧЕМУ ИЗ ХВОСТА ИДЕТ ДЫМ?!"); }
    if(type === 'wing') { plane.wingLost = true; say("ПИЛОТ: МЭЙДЭЙ! ТЕРЯЕМ ОБШИВКУ КРЫЛА!"); }
    if(type === 'lightning') { say("БАБАХ! Молния выжгла навигацию!"); plane.angle += 0.5; }
    if(type === 'alien') { plane.ufoActive = true; say("ПАССАЖИР: ЧТО ЭТО ЗА СВЕТЯЩАЯСЯ ТАРЕЛКА СНАРУЖИ?!"); }
}

function say(text) {
    chatterBox.innerText = text;
    setTimeout(() => { if(chatterBox.innerText === text) chatterBox.innerText = ""; }, 4000);
}

// Мобильный джойстик
const jBase = document.getElementById('joy-base');
const jStick = document.getElementById('joy-stick');
jBase.ontouchmove = (e) => {
    e.preventDefault();
    let r = jBase.getBoundingClientRect();
    let tx = e.touches[0].clientX - r.left - 50;
    let ty = e.touches[0].clientY - r.top - 50;
    let d = Math.sqrt(tx*tx + ty*ty);
    if(d > 40) { tx *= 40/d; ty *= 40/d; }
    jStick.style.transform = `translate(${tx}px, ${ty}px)`;
    joy.x = tx/40; joy.y = ty/40; joy.active = true;
};
jBase.ontouchend = () => { jStick.style.transform = `translate(0,0)`; joy.active = false; };

function loop() {
    if(!gameActive) return;

    // ЛОГИКА ПОЛЕТА
    if(plane.engineOk) {
        if(!isMobile) {
            let dx = mouse.x - plane.x;
            let dy = mouse.y - plane.y;
            plane.targetAngle = Math.atan2(dy, dx);
            plane.speed = Math.min(10, Math.sqrt(dx*dx + dy*dy)/20);
        } else if(joy.active) {
            plane.targetAngle = Math.atan2(joy.y, joy.x);
            plane.speed = 8;
        }
    } else {
        // Режим планирования при отказе
        plane.speed *= 0.998;
        plane.targetAngle = 0.2; // Тянет вниз
        if(plane.speed < 2) plane.speed = 2;
    }

    if(plane.gear) plane.speed *= 0.95; // Шасси тормозят

    let diff = plane.targetAngle - plane.angle;
    while(diff < -Math.PI) diff += Math.PI*2;
    while(diff > Math.PI) diff -= Math.PI*2;
    plane.angle += diff * 0.05;

    plane.y += Math.sin(plane.angle) * plane.speed + 1; // Гравитация
    worldX += Math.cos(plane.angle) * plane.speed;

    // ПРОВЕРКА КАТАСТРОФЫ
    if(plane.deathTimer > 0) {
        plane.deathTimer--;
        if(plane.deathTimer === 1) { plane.broken = true; say("САМОЛЕТ РАЗВАЛИЛСЯ В ВОЗДУХЕ!"); }
    }

    if(plane.y < -1000) { say("КОСМОС! ДВИГАТЕЛИ ЗАГЛОХЛИ!"); plane.engineOk = false; }
    
    // ЗЕМЛЯ И АЭРОПОРТ
    if(plane.y > canvas.height - 100) {
        let onRunway = (worldX % 1500 < 300);
        if(onRunway && plane.gear && plane.speed < 5) {
            plane.y = canvas.height - 110;
            plane.speed *= 0.9;
            plane.angle = 0;
            say("ПИЛОТ: Успешная посадка. Добро пожаловать!");
        } else {
            gameActive = false;
            alert("КАТАСТРОФА! " + (onRunway ? "Забыли шасси или большая скорость!" : "Разбились в поле!"));
            location.reload();
        }
    }

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    timeOfDay += 0.001;
    let day = (Math.sin(timeOfDay) + 1) / 2;
    let space = Math.min(1, Math.max(0, -plane.y / 800));

    // НЕБО
    ctx.fillStyle = `rgb(${20*(1-day)}, ${100*(1-day)*(1-space)}, ${255*(1-space)})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // СОЛНЦЕ / ЛУНА
    ctx.fillStyle = day > 0.5 ? "#fff" : "#ff0";
    ctx.beginPath();
    ctx.arc(canvas.width - 100, 100 + Math.sin(timeOfDay)*100, 30, 0, Math.PI*2);
    ctx.fill();

    // ЗЕМЛЯ И АЭРОПОРТЫ (1.5 км = 1500 единиц)
    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
    
    for(let i=-2; i<5; i++) {
        let x = (i * 1500 - worldX) % (1500 * 5);
        if(x < -500) x += 7500;
        
        // Аэропорт
        ctx.fillStyle = "#333";
        ctx.fillRect(x, canvas.height - 105, 400, 10);
        ctx.fillStyle = "#fff";
        for(let j=0; j<10; j++) ctx.fillRect(x + j*40, canvas.height-100, 20, 2);
        
        // Город рядом
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(x + 500, canvas.height - 200, 60, 100);
        ctx.fillRect(x + 580, canvas.height - 150, 40, 50);
    }

    // НЛО
    if(plane.ufoActive) {
        plane.ufoX += (plane.x - 150 - plane.ufoX) * 0.02;
        plane.ufoY += (plane.y - plane.ufoY) * 0.02;
        ctx.fillStyle = "silver";
        ctx.beginPath(); ctx.ellipse(plane.ufoX, plane.ufoY, 40, 15, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "cyan";
        ctx.beginPath(); ctx.arc(plane.ufoX, plane.ufoY-5, 10, 0, Math.PI*2); ctx.fill();
        
        if(Math.random() > 0.95) {
            ctx.strokeStyle = "lime"; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(plane.ufoX, plane.ufoY); ctx.lineTo(plane.x, plane.y); ctx.stroke();
            if(plane.deathTimer < 0) trigger('fire');
        }
    }

    // САМОЛЕТ
    ctx.save();
    ctx.translate(plane.x, plane.y);
    ctx.rotate(plane.angle);
    
    if(plane.fire) {
        ctx.fillStyle = "orange";
        ctx.beginPath(); ctx.arc(-40, 0, 10 + Math.random()*10, 0, Math.PI*2); ctx.fill();
    }

    ctx.fillStyle = "white";
    ctx.fillRect(-40, -10, 80, 20); // Корпус
    ctx.fillStyle = "blue";
    ctx.fillRect(20, -5, 15, 5); // Окна
    
    // Крылья
    ctx.fillStyle = "lightgray";
    ctx.fillRect(-10, -35, 20, 70);
    if(plane.wingLost) {
        ctx.fillStyle = "red"; ctx.fillRect(-10, 10, 20, 25); // Поврежденное крыло
    }

    // Шасси анимация
    if(plane.gear) {
        ctx.fillStyle = "black";
        ctx.fillRect(-20, 10, 5, 15);
        ctx.fillRect(10, 10, 5, 15);
    }

    ctx.restore();

    // UI
    document.getElementById('alt').innerText = Math.floor(Math.max(0, canvas.height - 100 - plane.y));
    document.getElementById('spd').innerText = Math.floor(plane.speed * 50);
}
</script>
</body>
</html>
