<!DOCTYPE html>

<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Электрондук мектеп</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#4f6cff,#7b8cff,#a7b3ff);
text-align:center;
}

header{
background:#2f3cff;
color:white;
padding:15px;
font-size:22px;
}

.box{
background:white;
width:95%;
max-width:520px;
margin:20px auto;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:14px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#4f6cff;
color:white;
}

.exit{background:#ff4444}
.next{background:#00a86b}

input,textarea{
width:90%;
padding:10px;
margin-top:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

.chat{
height:150px;
overflow:auto;
border:1px solid #ccc;
padding:6px;
text-align:left;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

</style>

</head>

<body>

<header>🏫 Электрондук мектеп</header>

<div class="box" id="role">

<h3>Ким кирет?</h3>

<button onclick="studentRegister()">👦 Окуучу</button> <button onclick="teacherLogin()">👨‍🏫 Мугалим</button>

</div>

<div class="box" id="studentRegister" style="display:none">

<h3>Окуучу аккаунт</h3>

<input id="studentName" placeholder="ФИО">
<input id="studentPass" type="password" placeholder="Пароль">
<input type="file" id="avatarInput">

<button onclick="saveStudent()">Сактоо</button>

</div>

<div class="box" id="studentLogin" style="display:none">

<h3>Кирүү</h3>

<input id="loginName" placeholder="ФИО">
<input id="loginPass" type="password" placeholder="Пароль">

<button onclick="enterStudent()">Кирүү</button>

</div>

<div class="box" id="teacherLoginBox" style="display:none">

<h3>Мугалим пароль</h3>

<input type="password" id="teacherPass">

<button onclick="enterTeacher()">Кирүү</button>

</div>

<div class="box" id="subjects" style="display:none">

<h3>Предмет тандоо</h3>

<button onclick="startTest('Математика')">➕ Математика</button> <button onclick="startTest('Кыргыз тили')">🇰🇬 Кыргыз тили</button>

<button class="exit" onclick="logout()">Чыгуу</button>

</div>

<div class="box" id="test" style="display:none">

<h3 id="subjectTitle"></h3>

<div id="questionBox"></div>

<button class="next" onclick="nextQuestion()">Кийинки</button>

<p id="result"></p>

<textarea id="comment" placeholder="Комментарий"></textarea>

<button onclick="saveResult()">Жиберүү</button>

</div>

<div class="box" id="teacherPanel" style="display:none">

<h3>📊 Журнал</h3>

<table>

<thead>
<tr>
<th>Аватар</th>
<th>Окуучу</th>
<th>Предмет</th>
<th>Баа</th>
<th>Комментарий</th>
</tr>
</thead>

<tbody id="journal"></tbody>

</table>

<h3>💬 Мугалим чат</h3>

<div class="chat" id="chatBox"></div>

<input id="chatInput" placeholder="Билдирүү">

<button onclick="sendMessage()">Жөнөтүү</button>

<button class="exit" onclick="logout()">Чыгуу</button>

</div>

<script>

let students=JSON.parse(localStorage.getItem("students")||"[]")
let journal=JSON.parse(localStorage.getItem("journal")||"[]")
let chat=JSON.parse(localStorage.getItem("chat")||"[]")

let currentStudent=""
let avatar=""
let subject=""
let questions=[]
let current=0
let score=0

const questionBank=[
{q:"5+5=?",a:["8","9","10"],c:2},
{q:"6+4=?",a:["9","10","11"],c:1},
{q:"7+1=?",a:["8","9","7"],c:0},
{q:"9-4=?",a:["5","6","4"],c:0},
{q:"3+3=?",a:["6","7","5"],c:0}
]

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function studentRegister(){
role.style.display="none"
studentRegister.style.display="block"
}

function teacherLogin(){
role.style.display="none"
teacherLoginBox.style.display="block"
}

function saveStudent(){

let name=document.getElementById("studentName").value
let pass=document.getElementById("studentPass").value

let file=document.getElementById("avatarInput").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(e){

avatar=e.target.result

students.push({name:name,pass:pass,avatar:avatar})

localStorage.setItem("students",JSON.stringify(students))

alert("Аккаунт түзүлдү")

location.reload()

}

reader.readAsDataURL(file)

}

}

function enterStudent(){

let name=document.getElementById("loginName").value
let pass=document.getElementById("loginPass").value

let found=students.find(s=>s.name==name && s.pass==pass)

if(found){

currentStudent=name
avatar=found.avatar

studentLogin.style.display="none"
subjects.style.display="block"

}else{

alert("Кирүү туура эмес")

}

}

function enterTeacher(){

teacherLoginBox.style.display="none"
teacherPanel.style.display="block"

updateJournal()
updateChat()

}

function startTest(sub){

subject=sub

questions=shuffle([...questionBank]).slice(0,3)

subjects.style.display="none"
test.style.display="block"

subjectTitle.innerText=sub

current=0
score=0

showQuestion()

}

function showQuestion(){

let q=questions[current]

let html="<b>"+(current+1)+". "+q.q+"</b><br>"

q.a.forEach((o,i)=>{
html+="<label><input type='radio' name='a' value='"+i+"'> "+o+"</label>"
})

questionBox.innerHTML=html

}

function nextQuestion(){

let ans=document.querySelector("input[name='a']:checked")

if(ans){
if(parseInt(ans.value)==questions[current].c){
score++
}
}

current++

if(current<questions.length){
showQuestion()
}else{
finish()
}

}

function finish(){

let grade=2

if(score==3)grade=5
else if(score==2)grade=4
else if(score==1)grade=3

result.innerText="Баа: "+grade

score=grade

}

function saveResult(){

let comment=document.getElementById("comment").value

journal.push({
name:currentStudent,
avatar:avatar,
subject:subject,
grade:score,
comment:comment
})

localStorage.setItem("journal",JSON.stringify(journal))

alert("Жиберилди")

location.reload()

}

function updateJournal(){

let html=""

journal.forEach(s=>{

html+=`
<tr>
<td><img src="${s.avatar}" class="avatar"></td>
<td>${s.name}</td>
<td>${s.subject}</td>
<td>${s.grade}</td>
<td>${s.comment}</td>
</tr>
`

})

document.getElementById("journal").innerHTML=html

}

function sendMessage(){

let msg=document.getElementById("chatInput").value

chat.push("👨‍🏫: "+msg)

localStorage.setItem("chat",JSON.stringify(chat))

updateChat()

}

function updateChat(){

let html=""

chat.forEach(m=>{
html+=m+"<br>"
})

chatBox.innerHTML=html

}

function logout(){
location.reload()
}

</script>

</body>
</html>
