<!DOCTYPE html>

<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Онлайн мектеп</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6a5cff,#8f7bff,#b3a8ff);
text-align:center;
}

header{
background:#4f46ff;
color:white;
padding:15px;
font-size:22px;
}

.box{
background:white;
width:95%;
max-width:520px;
margin:20px auto;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:16px;
margin-top:10px;
font-size:18px;
background:#5a54ff;
color:white;
border:none;
border-radius:10px;
}

.next{
background:#00a86b;
}

.restart{
background:#ff8c00;
}

.q{
text-align:left;
font-size:18px;
margin-top:10px;
}

label{
display:block;
padding:10px;
background:#f3f3f3;
margin-top:6px;
border-radius:8px;
}

input[type="radio"]{
margin-right:10px;
}

#timer{
font-size:20px;
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>📚 Онлайн мектеп</header>

<div class="box" id="start">

<h3>Ким кирет?</h3>

<button onclick="openStudent()">👦 Окуучу</button>

</div>

<div class="box" id="studentLogin" style="display:none">

<h3>Окуучу</h3>

<input id="sname" placeholder="ФИО" style="width:90%;padding:12px;font-size:16px">

<button onclick="enterStudent()">Баштоо</button>

</div>

<div class="box" id="subjects" style="display:none">

<h3>Предмет тандоо</h3>

<button onclick="startTest('math')">➕ Математика</button> <button onclick="startTest('ru')">🇷🇺 Орус тили</button> <button onclick="startTest('kg')">🇰🇬 Кыргыз тили</button> <button onclick="startTest('lit')">📖 Адабий окуу</button> <button onclick="startTest('meken')">🌍 Мекен таануу</button>

</div>

<div class="box" id="test" style="display:none">

<h3 id="subjectTitle"></h3>

<div id="timer">⏱ 10:00</div>

<div id="questionBox"></div>

<button class="next" onclick="nextQuestion()">Кийинки</button>

<p id="result"></p>

<div id="restartArea"></div>

</div>

<script>

let questions=[]
let current=0
let score=0

let time=600
let timerInterval

function shuffle(arr){

return arr.sort(()=>Math.random()-0.5)

}

function getRandom(arr,count){

let shuffled=shuffle(arr)

return shuffled.slice(0,count)

}

const data={

math:[
{q:"5+5=?",a:["8","9","10"],c:2},
{q:"6+4=?",a:["9","10","11"],c:1},
{q:"8+2=?",a:["10","9","8"],c:0},
{q:"7+1=?",a:["8","7","9"],c:0},
{q:"9-4=?",a:["5","4","6"],c:0},
{q:"3+3=?",a:["6","5","7"],c:0},
{q:"10-2=?",a:["7","8","9"],c:1},
{q:"4+4=?",a:["7","8","9"],c:1},
{q:"6+3=?",a:["9","10","8"],c:0},
{q:"2+7=?",a:["8","9","7"],c:1}
],

ru:[
{q:"Слово мама канча тамга?",a:["3","4","5"],c:1},
{q:"Дом деген эмне?",a:["үй","шаар","тамак"],c:0},
{q:"Книга эмне?",a:["китеп","ручка","стол"],c:0},
{q:"Ручка эмне?",a:["калем","үй","машина"],c:0},
{q:"Стол эмне?",a:["стол","жер","жыл"],c:0},
{q:"Школа эмне?",a:["мектеп","тамак","жер"],c:0}
],

kg:[
{q:"Кыргыз тили кайсы?",a:["орус","кыргыз","англис"],c:1},
{q:"Алфавит канча тамга?",a:["36","30","40"],c:0},
{q:"Кыргызстан эмне?",a:["өлкө","шаар","адам"],c:0},
{q:"Бишкек эмне?",a:["шаар","адам","китеп"],c:0},
{q:"Кыргызстандын акчасы?",a:["сом","рубль","доллар"],c:0},
{q:"Кыргызстандын туусу кандай?",a:["кызыл","көк","жашыл"],c:0}
],

lit:[
{q:"Жомок деген эмне?",a:["окуя","машина","жер"],c:0},
{q:"Китепти ким жазат?",a:["жазуучу","айдоочу","доктур"],c:0},
{q:"Поэзия?",a:["ыр","тамак","оюн"],c:0},
{q:"Автор деген?",a:["жазуучу","доктур","айдоочу"],c:0},
{q:"Окуу эмне?",a:["билим","тамак","оюн"],c:0}
],

meken:[
{q:"Кыргызстандын борбору?",a:["Ош","Бишкек","Нарын"],c:1},
{q:"Акча?",a:["сом","рубль","доллар"],c:0},
{q:"Туу кандай?",a:["кызыл","жашыл","көк"],c:0},
{q:"Кыргызстан эмне?",a:["өлкө","шаар","китеп"],c:0},
{q:"Бишкек кайда?",a:["Кыргызстан","Россия","Кытай"],c:0}
]

}

function openStudent(){

start.style.display="none"
studentLogin.style.display="block"

}

function enterStudent(){

studentLogin.style.display="none"
subjects.style.display="block"

}

function startTimer(){

time=600

timerInterval=setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

if(s<10)s="0"+s

timer.innerText="⏱ "+m+":"+s

if(time<=0){

clearInterval(timerInterval)

finish()

}

},1000)

}

function startTest(key){

questions=getRandom(data[key],5)

current=0
score=0

subjects.style.display="none"
test.style.display="block"

subjectTitle.innerText=key

startTimer()

showQuestion()

}

function showQuestion(){

let q=questions[current]

let html="<div class='q'><b>"+(current+1)+") "+q.q+"</b><br>"

q.a.forEach((o,i)=>{
html+="<label><input type='radio' name='a' value='"+i+"'> "+o+"</label>"
})

html+="</div>"

questionBox.innerHTML=html

}

function nextQuestion(){

let ans=document.querySelector("input[name='a']:checked")

if(ans){

if(parseInt(ans.value)==questions[current].c){

score++

}

}

current++

if(current<questions.length){

showQuestion()

}else{

finish()

}

}

function finish(){

clearInterval(timerInterval)

let grade=2

if(score==5)grade=5
else if(score>=3)grade=4
else if(score>=2)grade=3

let msg="Балл: "+score+" | Баа: "+grade

if(grade==2){

msg+=" 😅 Сен двойичниксинби?"

}

result.innerText=msg

restartArea.innerHTML="<button class='restart' onclick='location.reload()'>🔄 Кайра баштоо</button>"

}

</script>

</body>
</html>
