<!DOCTYPE html>

<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Электрондук мектеп</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#5c6cff,#8a96ff);
text-align:center;
}

header{
background:#2f3cff;
color:white;
padding:15px;
font-size:22px;
}

.box{
background:white;
width:92%;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:17px;
border:none;
border-radius:8px;
background:#4f6cff;
color:white;
}

.exit{
background:#ff4c4c;
}

.next{
background:#00a86b;
}

input,textarea{
width:90%;
padding:10px;
margin-top:6px;
font-size:16px;
}

label{
display:block;
background:#f2f2f2;
padding:10px;
margin-top:6px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
font-size:14px;
}

.chat{
height:150px;
overflow:auto;
border:1px solid #ccc;
padding:8px;
text-align:left;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

</style>

</head>

<body>

<header>🏫 Электрондук мектеп</header>

<div class="box" id="role">

<h3>Ким кирет?</h3>

<button onclick="openStudentRegister()">👦 Окуучу</button> <button onclick="openTeacherLogin()">👨‍🏫 Мугалим</button>

</div>

<div class="box" id="studentRegister" style="display:none">

<h3>Окуучу каттоо</h3>

<input id="regName" placeholder="ФИО">
<input id="regPass" type="password" placeholder="Пароль">

<button onclick="registerStudent()">Катталуу</button> <button class="exit" onclick="reload()">Артка</button>

</div>

<div class="box" id="studentLogin" style="display:none">

<h3>Окуучу кирүү</h3>

<input id="loginName" placeholder="ФИО">
<input id="loginPass" type="password" placeholder="Пароль">

<button onclick="loginStudent()">Кирүү</button> <button onclick="showRegister()">Катталуу</button>

</div>

<div class="box" id="teacherLogin" style="display:none">

<h3>Мугалим кирүү</h3>

<input id="teacherName" placeholder="Мугалим аты">
<input id="teacherPass" type="password" placeholder="Пароль">

<button onclick="loginTeacher()">Кирүү</button> <button class="exit" onclick="reload()">Артка</button>

</div>

<div class="box" id="subjects" style="display:none">

<h3>Предмет тандоо</h3>

<button onclick="startTest('Математика')">➕ Математика</button> <button onclick="startTest('Кыргыз тили')">📖 Кыргыз тили</button> <button onclick="startTest('Орус тили')">🇷🇺 Орус тили</button>

<button class="exit" onclick="reload()">Чыгуу</button>

</div>

<div class="box" id="test" style="display:none">

<h3 id="subjectTitle"></h3>

<div id="questionBox"></div>

<button class="next" onclick="nextQuestion()">Кийинки</button>

<p id="result"></p>

<textarea id="comment" placeholder="Комментарий"></textarea>

<button onclick="saveResult()">Жиберүү</button>

</div>

<div class="box" id="teacherPanel" style="display:none">

<h3>📊 Журнал</h3>

<table>

<tr>
<th>Окуучу</th>
<th>Предмет</th>
<th>Баа</th>
<th>Комментарий</th>
</tr>

<tbody id="journal"></tbody>

</table>

<h3>💬 Чат</h3>

<div class="chat" id="chatBox"></div>

<input id="chatInput" placeholder="Билдирүү">

<button onclick="sendMessage()">Жөнөтүү</button>

<button class="exit" onclick="reload()">Чыгуу</button>

</div>

<script>

let students=JSON.parse(localStorage.getItem("students")||"[]")
let journal=JSON.parse(localStorage.getItem("journal")||"[]")
let chat=JSON.parse(localStorage.getItem("chat")||"[]")

let currentStudent=""
let subject=""
let questions=[]
let current=0
let score=0

const questionBank=[
{q:"5+5=?",a:["8","9","10"],c:2},
{q:"6+4=?",a:["9","10","11"],c:1},
{q:"7+1=?",a:["8","9","7"],c:0},
{q:"9-4=?",a:["5","6","4"],c:0},
{q:"3+3=?",a:["6","7","5"],c:0},
{q:"10-2=?",a:["7","8","9"],c:1}
]

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function openStudentRegister(){
document.getElementById("role").style.display="none"
document.getElementById("studentRegister").style.display="block"
}

function openTeacherLogin(){
document.getElementById("role").style.display="none"
document.getElementById("teacherLogin").style.display="block"
}

function showRegister(){
document.getElementById("studentLogin").style.display="none"
document.getElementById("studentRegister").style.display="block"
}

function registerStudent(){

let name=document.getElementById("regName").value
let pass=document.getElementById("regPass").value

students.push({name:name,pass:pass})

localStorage.setItem("students",JSON.stringify(students))

alert("Катталды!")

reload()

}

function loginStudent(){

let name=document.getElementById("loginName").value
let pass=document.getElementById("loginPass").value

let found=students.find(s=>s.name==name && s.pass==pass)

if(found){

currentStudent=name

document.getElementById("studentLogin").style.display="none"
document.getElementById("subjects").style.display="block"

}else{
alert("Кирүү туура эмес")
}

}

function loginTeacher(){

document.getElementById("teacherLogin").style.display="none"
document.getElementById("teacherPanel").style.display="block"

updateJournal()
updateChat()

}

function startTest(sub){

subject=sub
questions=shuffle([...questionBank]).slice(0,3)

document.getElementById("subjects").style.display="none"
document.getElementById("test").style.display="block"

document.getElementById("subjectTitle").innerText=sub

current=0
score=0

showQuestion()

}

function showQuestion(){

let q=questions[current]

let html="<b>"+(current+1)+". "+q.q+"</b>"

q.a.forEach((o,i)=>{
html+="<label><input type='radio' name='a' value='"+i+"'> "+o+"</label>"
})

document.getElementById("questionBox").innerHTML=html

}

function nextQuestion(){

let ans=document.querySelector("input[name='a']:checked")

if(ans){
if(parseInt(ans.value)==questions[current].c){
score++
}
}

current++

if(current<questions.length){
showQuestion()
}else{
finish()
}

}

function finish(){

let grade=2

if(score==3)grade=5
else if(score==2)grade=4
else if(score==1)grade=3

document.getElementById("result").innerText="Баа: "+grade

score=grade

}

function saveResult(){

let comment=document.getElementById("comment").value

journal.push({
name:currentStudent,
subject:subject,
grade:score,
comment:comment
})

localStorage.setItem("journal",JSON.stringify(journal))

alert("Сакталды")

reload()

}

function updateJournal(){

let html=""

journal.forEach(j=>{
html+=`<tr>
<td>${j.name}</td>
<td>${j.subject}</td>
<td>${j.grade}</td>
<td>${j.comment}</td>
</tr>`
})

document.getElementById("journal").innerHTML=html

}

function sendMessage(){

let msg=document.getElementById("chatInput").value

chat.push("👨‍🏫 "+msg)

localStorage.setItem("chat",JSON.stringify(chat))

updateChat()

}

function updateChat(){

let html=""

chat.forEach(m=>{
html+=m+"<br>"
})

document.getElementById("chatBox").innerHTML=html

}

function reload(){
location.reload()
}

</script>

</body>
</html>
