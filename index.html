<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dino Galaxy Ultimate</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white}
canvas{display:block;margin:auto;background:#111}
.menu{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#1a1a1a;padding:30px;border-radius:20px;
text-align:center;z-index:10;
}
button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:10px;
background:#333;
color:white;
cursor:pointer;
font-size:16px;
}
#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}
</style>
</head>
<body>

<div id="mainMenu" class="menu">
<h1>🐲 DINO GALAXY</h1>
<p>Выберите устройство</p>
<button onclick="setDevice('pc')">ПК</button>
<button onclick="setDevice('mobile')">Телефон</button>
<button onclick="setDevice('tablet')">Планшет</button>
</div>

<div id="shop" class="menu" style="display:none;"></div>
<div id="ui"></div>

<canvas id="game" width="1000" height="500" style="display:none;"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let device="pc";
let gameRunning=false;
let paused=false;

let player={x:150,y:380,vy:0,hp:20};
let gravity=1;

let zombies=[];
let bullets=[];
let boss=null;

let coins=0;
let wave=1;

let spawnInterval=null;

/* DEVICE SELECT */
function setDevice(type){
device=type;
document.getElementById("mainMenu").style.display="none";
canvas.style.display="block";
startGame();
}

/* START GAME */
function startGame(){
gameRunning=true;
spawnInterval=setInterval(spawnZombies,5000);
update();
}

/* SPAWN 3 ZOMBIES EVERY 5 SEC */
function spawnZombies(){
if(!gameRunning)return;

for(let i=0;i<3;i++){
zombies.push(createZombie());
}

if(wave%5===0 && !boss){
boss=createBoss();
}

wave++;
}

/* CREATE ZOMBIE */
function createZombie(){
return{
x:1000,
y:380,
hp:9,
frame:0,
dead:false,
deathFrame:0
};
}

/* CREATE BOSS DRAGON */
function createBoss(){
return{
x:1000,
y:300,
hp:29,
frame:0,
dead:false,
deathFrame:0
};
}

/* CONTROLS */
document.addEventListener("keydown",e=>{
if(device==="pc"){
if(e.code==="Space")player.vy=-18;
if(e.key==="f")shoot();
if(e.key==="b")openShop();
}
});

canvas.addEventListener("click",()=>{
if(device!=="pc")shoot();
});

function shoot(){
bullets.push({x:player.x+60,y:player.y+20});
}

/* SHOP */
function openShop(){
paused=true;
document.getElementById("shop").style.display="block";
document.getElementById("shop").innerHTML=`
<h2>МАГАЗИН</h2>
<p>Монеты: ${coins}</p>
<button onclick="closeShop()">Закрыть</button>
`;
}

function closeShop(){
paused=false;
document.getElementById("shop").style.display="none";
update();
}

/* DRAW PLAYER DRAGON */
function drawPlayer(){
ctx.fillStyle="green";
ctx.fillRect(player.x,player.y,70,50);

/* глаз */
ctx.fillStyle="white";
ctx.fillRect(player.x+50,player.y+10,10,10);
ctx.fillStyle="black";
ctx.fillRect(player.x+55,player.y+13,5,5);

/* ноги анимация */
let legOffset=Math.sin(Date.now()/100)*5;
ctx.fillStyle="darkgreen";
ctx.fillRect(player.x+10,player.y+50,10,20+legOffset);
ctx.fillRect(player.x+40,player.y+50,10,20-legOffset);

/* рука */
ctx.fillRect(player.x+65,player.y+20,15,10);
}

/* DRAW ZOMBIE */
function drawZombie(z){
if(z.dead){
ctx.fillStyle="red";
ctx.globalAlpha=1-(z.deathFrame/30);
ctx.fillRect(z.x,z.y,40,40);
ctx.globalAlpha=1;
z.deathFrame++;
return;
}

ctx.fillStyle="green";
ctx.fillRect(z.x,z.y,40,40);

/* глаза */
ctx.fillStyle="white";
ctx.fillRect(z.x+5,z.y+10,8,8);
ctx.fillRect(z.x+20,z.y+10,8,8);

/* рот */
ctx.fillStyle="black";
ctx.fillRect(z.x+10,z.y+25,15,5);

/* ноги бег */
let leg=Math.sin(Date.now()/150)*5;
ctx.fillRect(z.x+5,z.y+40,8,20+leg);
ctx.fillRect(z.x+25,z.y+40,8,20-leg);

/* руки */
ctx.fillRect(z.x-5,z.y+15,10,8);
ctx.fillRect(z.x+35,z.y+15,10,8);
}

/* DRAW BOSS */
function drawBoss(b){
if(b.dead){
ctx.fillStyle="orange";
ctx.globalAlpha=1-(b.deathFrame/60);
ctx.fillRect(b.x,b.y,80,80);
ctx.globalAlpha=1;
b.deathFrame++;
return;
}

ctx.fillStyle="purple";
ctx.fillRect(b.x,b.y,80,80);

/* глаза */
ctx.fillStyle="red";
ctx.fillRect(b.x+20,b.y+20,15,15);
ctx.fillRect(b.x+50,b.y+20,15,15);

/* крылья */
ctx.fillStyle="darkred";
ctx.fillRect(b.x-30,b.y+10,30,40);
ctx.fillRect(b.x+80,b.y+10,30,40);

/* ноги */
let leg=Math.sin(Date.now()/120)*8;
ctx.fillRect(b.x+15,b.y+80,15,30+leg);
ctx.fillRect(b.x+50,b.y+80,15,30-leg);
}

/* UPDATE LOOP */
function update(){
if(!gameRunning||paused)return;

ctx.clearRect(0,0,1000,500);

/* physics */
player.vy+=gravity;
player.y+=player.vy;
if(player.y>380){player.y=380;player.vy=0;}

drawPlayer();

/* bullets */
bullets.forEach((b,i)=>{
b.x+=10;
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y,10,5);

zombies.forEach((z)=>{
if(!z.dead && b.x>z.x && b.x<z.x+40){
z.hp-=5;
if(z.hp<=0){z.dead=true;coins+=1;}
}
});

if(boss && !boss.dead && b.x>boss.x && b.x<boss.x+80){
boss.hp-=5;
if(boss.hp<=0){boss.dead=true;coins+=10;}
}
});

/* zombies */
zombies.forEach((z,i)=>{
if(!z.dead)z.x-=2;
drawZombie(z);
});

/* boss */
if(boss){
if(!boss.dead)boss.x-=1.5;
drawBoss(boss);
}

document.getElementById("ui").innerHTML=
"❤️ "+player.hp+
" | 💰 "+coins+
" | 🌊 Wave "+wave;

requestAnimationFrame(update);
}
</script>
</body>
</html>
