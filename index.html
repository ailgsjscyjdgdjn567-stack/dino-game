<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dino Galaxy 2.0</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white}
canvas{display:block;margin:auto}
#menu,#shop{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;padding:30px;border-radius:20px;
text-align:center;z-index:10;
}
button{padding:10px 15px;margin:5px;border:none;border-radius:10px;background:#222;color:white;cursor:pointer}
#ui{position:absolute;top:10px;left:10px}
</style>
</head>
<body>

<div id="menu">
<h1>🦖 DINO GALAXY 2.0</h1>
<button onclick="start()">PLAY</button>
</div>

<div id="shop" style="display:none"></div>
<div id="ui"></div>
<canvas id="game" width="900" height="500" style="display:none"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const menu=document.getElementById("menu");
const shop=document.getElementById("shop");
const ui=document.getElementById("ui");

/* SAVE SYSTEM */
let save=JSON.parse(localStorage.getItem("dinoSave"))||{
coins:0,
maxHP:10,
damage:5,
ultCD:8000
};
function saveGame(){
localStorage.setItem("dinoSave",JSON.stringify(save));
}

/* GAME DATA */
let player={x:100,y:380,vy:0,hp:save.maxHP};
let gravity=1;
let bullets=[];
let zombies=[];
let particles=[];
let wave=1;
let spawnCount=0;
let gameRunning=false;
let ultReady=true;
let shake=0;
let damageFlash=0;

/* START */
function start(){
menu.style.display="none";
canvas.style.display="block";
gameRunning=true;
nextWave();
update();
}

/* WAVES */
function nextWave(){
spawnCount=5+wave*2;
setTimeout(()=>spawnZombie(),1000);
}

function spawnZombie(){
if(spawnCount<=0)return;
let type=Math.random();
let z={x:900,y:380,type:"normal",hp:5+wave};
if(type<0.25){z.type="fast";z.hp=3+wave;}
else if(type<0.5){z.type="tank";z.hp=15+wave*2;}
else if(type<0.65){z.type="boom";z.hp=4+wave;}
zombies.push(z);
spawnCount--;
setTimeout(spawnZombie,800);
}

/* CONTROLS */
document.addEventListener("keydown",e=>{
if(e.code==="Space")player.vy=-18;
if(e.key==="f")useUlt();
});
canvas.addEventListener("mousedown",()=>shoot());

function shoot(){
bullets.push({x:player.x+60,y:player.y+20});
}

function useUlt(){
if(!ultReady)return;
ultReady=false;
zombies=[];
setTimeout(()=>ultReady=true,save.ultCD);
}

/* SHOP */
document.addEventListener("keydown",e=>{
if(e.key==="b")openShop();
});

function openShop(){
gameRunning=false;
shop.style.display="block";
shop.innerHTML=`
<h2>МАГАЗИН</h2>
<p>💰 ${save.coins}</p>
<button onclick="upgradeHP()">+HP (20)</button>
<button onclick="upgradeDMG()">+Урон (20)</button>
<button onclick="upgradeUlt()">-КД Ульты (30)</button>
<br><button onclick="closeShop()">Закрыть</button>
`;
}

function closeShop(){
shop.style.display="none";
gameRunning=true;
update();
}

function upgradeHP(){
if(save.coins>=20){
save.coins-=20;
save.maxHP+=5;
player.hp=save.maxHP;
saveGame();
openShop();
}
}
function upgradeDMG(){
if(save.coins>=20){
save.coins-=20;
save.damage+=2;
saveGame();
openShop();
}
}
function upgradeUlt(){
if(save.coins>=30){
save.coins-=30;
save.ultCD=Math.max(2000,save.ultCD-1000);
saveGame();
openShop();
}
}

/* LOOP */
function update(){
if(!gameRunning)return;

ctx.save();
ctx.translate(Math.random()*shake,Math.random()*shake);
ctx.fillStyle="black";
ctx.fillRect(0,0,900,500);

/* Player physics */
player.vy+=gravity;
player.y+=player.vy;
if(player.y>380){player.y=380;player.vy=0;}

/* Player */
ctx.fillStyle="lime";
ctx.fillRect(player.x,player.y,50,40);

/* Bullets */
bullets.forEach((b,i)=>{
b.x+=10;
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y,8,4);
zombies.forEach((z,zi)=>{
if(b.x>z.x && b.x<z.x+40){
z.hp-=save.damage;
bullets.splice(i,1);
if(z.hp<=0){
zombies.splice(zi,1);
save.coins+=5;
wave++;
nextWave();
}
}
});
});

/* Zombies */
zombies.forEach((z,i)=>{
let speed=2;
if(z.type==="fast")speed=4;
if(z.type==="tank")speed=1.5;
if(z.type==="boom")speed=3;
z.x-=speed;

ctx.fillStyle=
z.type==="fast"?"cyan":
z.type==="tank"?"purple":
z.type==="boom"?"orange":"green";

ctx.fillRect(z.x,z.y,40,40);

if(z.x<player.x+40){
player.hp-=2;
shake=10;
damageFlash=5;
zombies.splice(i,1);
}
});

/* Effects */
if(damageFlash>0){
ctx.fillStyle="rgba(255,0,0,0.3)";
ctx.fillRect(0,0,900,500);
damageFlash--;
}
shake*=0.9;

ui.innerHTML=`❤️ ${player.hp} | 💰 ${save.coins} | 🌊 Wave ${wave} | ⚡ ${ultReady?"READY":"..."}`;

if(player.hp<=0){
gameRunning=false;
menu.style.display="block";
}

ctx.restore();
requestAnimationFrame(update);
}
</script>
</body>
</html>
