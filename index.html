<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Deep Miner Tycoon</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; touch-action: none; }
        canvas { display: block; }

        /* Интерфейс */
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn { padding: 15px 40px; margin: 10px; font-size: 18px; cursor: pointer; background: #34495e; color: white; border: 2px solid #ecf0f1; border-radius: 8px; min-width: 200px; }
        
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; pointer-events: none; display: none; border: 1px solid #555; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .shop-area { pointer-events: auto; margin-top: 10px; }
        .shop-btn { background: #27ae60; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 5px; font-weight: bold; transition: 0.2s; }
        .shop-btn:active { transform: scale(0.95); }

        /* Уведомления */
        #msg-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 36px; display: none; text-shadow: 3px 3px 0px #000; pointer-events: none; z-index: 10; text-align: center; }

        /* Мобильное управление */
        #mobile-controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .m-group { display: flex; gap: 12px; align-items: flex-end; }
        .m-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; user-select: none; border: 1px solid rgba(255,255,255,0.3); -webkit-tap-highlight-color: transparent; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; opacity: 0.6; }
        .depth-info { font-size: 14px; color: #bdc3c7; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>3D DEEP MINER</h1>
    <p>Чем глубже — тем дороже руда!</p>
    <div id="menu-device">
        <button class="btn" onclick="initGame('pc')">💻 ИГРАТЬ (ПК)</button>
        <button class="btn" onclick="initGame('mobile')">📱 ИГРАТЬ (ТЕЛЕФОН)</button>
    </div>
</div>

<div id="ui">
    <div class="depth-info">Глубина: <span id="depth-val">0</span>м</div>
    <div style="font-size: 20px;">💰 $<span id="money" style="color:#f1c40f">0</span></div>
    <div style="margin-bottom: 5px;">🎒 <span id="bag">0</span> / <span id="maxBag">3</span></div>
    <div style="font-size: 14px;">Инструмент: <span id="tool-name" style="color:#3498db">Лопата</span></div>
    <div class="shop-area">
        <button class="shop-btn" onclick="sellAll()">ПРОДАТЬ ВСЁ (F)</button>
        <button id="upgrade-btn" class="shop-btn" onclick="buyUpgrade()">+МЕСТО ($200)</button>
    </div>
</div>

<div id="msg-center"></div>
<div id="crosshair"></div>

<div id="mobile-controls">
    <div class="m-group"><div class="m-btn" id="m-up">⬆️</div></div>
    <div class="m-group">
        <div class="m-btn" id="m-jump" style="background:rgba(52, 152, 219, 0.4)">🚀</div>
        <div class="m-btn" onclick="sellAll()" style="background:rgba(46, 204, 113, 0.4)">💰</div>
        <div class="m-btn" onclick="toggleTool()">🔄</div>
        <div class="m-btn" id="dig-btn" style="background:rgba(231, 76, 60, 0.4)">⛏️</div>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

    // --- ПЕРЕМЕННЫЕ ---
    let state = { money: 0, bag: 0, maxBag: 3, tool: 'shovel', bagLvl: 1, isMobile: false, inventory: [] };
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let velocity = new THREE.Vector3();
    let canJump = false;

    // --- ЦЕНЫ РУДЫ ---
    const ORE_VALUES = { dirt: 10, stone: 20, iron: 50, gold: 150, diamond: 500 };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.15);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Свет вокруг игрока
    const pointLight = new THREE.PointLight(0xffffff, 1.5, 6);
    scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0x222222));

    const blocks = [];
    const geometry = new THREE.BoxGeometry(1, 1, 1);

    function createWorld() {
        for(let x = -6; x <= 6; x++) {
            for(let z = -6; z <= 6; z++) {
                for(let y = 0; y > -20; y--) {
                    let type = 'dirt', color = 0x6d4c41;

                    if (y === 0) color = 0x27ae60;
                    else if (y < -3 && y >= -7) { type = 'stone'; color = 0x7f8c8d; }
                    else if (y < -7) { type = 'stone'; color = 0x3d3d3d; } // Глубокий сланец

                    // Генерация руд
                    let rand = Math.random();
                    if (y < -2 && y > -6 && rand > 0.96) { type = 'iron'; color = 0xd7ccc8; }
                    if (y < -6 && y > -12 && rand > 0.95) { type = 'gold'; color = 0xf1c40f; }
                    if (y < -12 && rand > 0.94) { type = 'diamond'; color = 0x00e5ff; }

                    const mat = new THREE.MeshStandardMaterial({ color: color });
                    const cube = new THREE.Mesh(geometry, mat);
                    cube.position.set(x, y, z);
                    cube.userData = { type: type };
                    scene.add(cube);
                    blocks.push(cube);
                }
            }
        }
    }
    createWorld();

    const controls = new PointerLockControls(camera, document.body);

    window.initGame = (mode) => {
        state.isMobile = (mode === 'mobile');
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        if(!state.isMobile) { controls.lock(); document.getElementById('crosshair').style.display = 'block'; }
        else { document.getElementById('mobile-controls').style.display = 'flex'; }
    };

    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveForward = true;
        if(e.code === 'KeyS') moveBackward = true;
        if(e.code === 'KeyA') moveLeft = true;
        if(e.code === 'KeyD') moveRight = true;
        if(e.code === 'KeyF') sellAll();
        if(e.code === 'Space' && canJump) { velocity.y += 5.5; canJump = false; }
        if(e.code === 'Digit1') setTool('shovel');
        if(e.code === 'Digit2') setTool('pickaxe');
    });
    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveForward = false;
        if(e.code === 'KeyS') moveBackward = false;
        if(e.code === 'KeyA') moveLeft = false;
        if(e.code === 'KeyD') moveRight = false;
    });

    document.getElementById('m-up').ontouchstart = (e) => { e.preventDefault(); moveForward = true; };
    document.getElementById('m-up').ontouchend = () => moveForward = false;
    document.getElementById('m-jump').ontouchstart = (e) => { e.preventDefault(); if(canJump) { velocity.y += 5.5; canJump = false; }};

    function setTool(t) {
        state.tool = t;
        document.getElementById('tool-name').innerText = t === 'shovel' ? 'Лопата' : 'Кирка';
        document.getElementById('tool-name').style.color = t === 'shovel' ? '#3498db' : '#e67e22';
    }
    window.toggleTool = () => setTool(state.tool === 'shovel' ? 'pickaxe' : 'shovel');

    const raycaster = new THREE.Raycaster();
    function dig() {
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = raycaster.intersectObjects(blocks);
        if(hits.length > 0 && hits[0].distance < 3.5) {
            if(state.bag >= state.maxBag) { showCenterMsg("СУМКА ПОЛНА!", "#ff4757"); return; }
            
            const obj = hits[0].object;
            const type = obj.userData.type;
            const isDirt = (type === 'dirt');
            
            if((isDirt && state.tool === 'shovel') || (!isDirt && state.tool === 'pickaxe')) {
                scene.remove(obj);
                blocks.splice(blocks.indexOf(obj), 1);
                state.bag++;
                state.inventory.push(type);
                updateUI();
            }
        }
    }

    window.sellAll = () => {
        if(state.bag === 0) return;
        let total = 0;
        state.inventory.forEach(item => { total += ORE_VALUES[item] || 10; });
        state.money += total;
        state.bag = 0;
        state.inventory = [];
        showCenterMsg(`+$${total}`, "#2ecc71");
        updateUI();
    };

    window.buyUpgrade = () => {
        let cost = state.bagLvl * 200;
        if(state.money >= cost) { state.money -= cost; state.maxBag += 3; state.bagLvl++; updateUI(); }
        else { showCenterMsg(`НУЖНО $${cost}`, "#e74c3c"); }
    };

    function updateUI() {
        document.getElementById('money').innerText = state.money;
        document.getElementById('bag').innerText = state.bag;
        document.getElementById('maxBag').innerText = state.maxBag;
        document.getElementById('upgrade-btn').innerText = `+МЕСТО ($${state.bagLvl * 200})`;
        document.getElementById('depth-val').innerText = Math.abs(Math.floor(camera.position.y - 1.6));
    }

    function showCenterMsg(text, color) {
        const m = document.getElementById('msg-center');
        m.innerText = text; m.style.color = color; m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 1000);
    }

    document.addEventListener('mousedown', () => { if(controls.isLocked) dig(); });
    document.getElementById('dig-btn').ontouchstart = (e) => { e.preventDefault(); dig(); };

    let prevTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        if (controls.isLocked || state.isMobile) {
            velocity.y -= 16.0 * delta; 
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            let dir = new THREE.Vector3();
            dir.z = Number(moveForward) - Number(moveBackward);
            dir.x = Number(moveRight) - Number(moveLeft);
            dir.normalize();

            if (moveForward || moveBackward) velocity.z -= dir.z * 50.0 * delta;
            if (moveLeft || moveRight) velocity.x -= dir.x * 50.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
            camera.position.y += (velocity.y * delta);
            
            // Свет следует за камерой
            pointLight.position.copy(camera.position);

            let p = camera.position;
            canJump = false;
            for(let b of blocks) {
                if(Math.abs(p.x - b.position.x) < 0.7 && Math.abs(p.z - b.position.z) < 0.7) {
                    if(p.y < b.position.y + 1.6 && p.y > b.position.y + 0.5) {
                        p.y = b.position.y + 1.6; velocity.y = 0; canJump = true; break;
                    }
                }
            }
            if(p.y < -50) p.set(0, 5, 0);
            if(time % 500 < 20) updateUI(); // Обновляем глубину
        }
        prevTime = time;
        renderer.render(scene, camera);
    }
    camera.position.set(0, 2, 0);
    animate();
</script>
</body>
</html>
